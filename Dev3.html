<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vortex Star V2.0 - Kris Artura</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #00050a; /* Màu xanh đen vũ trụ sâu thẳm */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        canvas { display: block; }
        #author {
            position: absolute;
            bottom: 10px;
            left: 15px;
            color: rgba(0, 242, 255, 0.4);
            font-size: 11px;
            letter-spacing: 2px;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="author">ENGINE BY KRIS ARTURA</div>
<canvas id="gameCanvas"></canvas>

<script>
/**
 * VORTEX STAR V2.0 - COMIC INTERACTIVE VERSION
 * Cập nhật: Hiệu ứng Rainbow, UI Heart, Vũ trụ sâu thẳm.
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- CẤU HÌNH THỜI GIAN (1 phút 20 giây = 80.000 ms) ---
const TOTAL_DURATION = 80000; 
const HARD_MODE_START = 0.75; // Bắt đầu khó từ 75% tiến trình (tương đương 60 giây đầu, 20 giây cuối)

const STATE = { PLAY: 0, DIE: 1, WIN_AUTO: 2, FIREWORKS: 3 };
let currentGameState = STATE.PLAY;
let elapsedTime = 0;
let lastTime = performance.now();
let progress = 0;
let fadeAlpha = 0;

// Đối tượng người chơi
const star = {
    x: canvas.width / 2,
    y: canvas.height * 0.8,
    targetX: canvas.width / 2,
    targetY: canvas.height * 0.8,
    size: 22,
    hp: 3,
    angle: 0,
    invul: false,
    invulTimer: 0,
    trail: []
};

let asteroids = [];
let items = [];
let particles = [];
let starsBG = []; // Các ngôi sao lấp lánh ở nền

// Khởi tạo nền vũ trụ
function initUniverse() {
    for(let i=0; i<150; i++) {
        starsBG.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            s: Math.random() * 2,
            o: Math.random()
        });
    }
}
initUniverse();

// --- HÀM VẼ HÌNH TRÁI TIM (Dùng cho UI và Item) ---
function drawHeart(x, y, size, color, isShadow = true) {
    ctx.save();
    ctx.translate(x, y);
    if(isShadow) {
        ctx.shadowBlur = 15;
        ctx.shadowColor = color;
    }
    ctx.beginPath();
    ctx.moveTo(0, size/4);
    ctx.bezierCurveTo(0, 0, -size/2, -size/2, -size, 0);
    ctx.bezierCurveTo(-size, size/2, 0, size, 0, size * 1.2);
    ctx.bezierCurveTo(0, size, size, size/2, size, 0);
    ctx.bezierCurveTo(size, -size/2, 0, 0, 0, size/4);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.restore();
}

// --- HÀM VẼ NGÔI SAO 5 CÁNH ---
function drawStar(x, y, r, p, m, angle, color) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(0, 0 - r);
    for (let i = 0; i < p; i++) {
        ctx.rotate(Math.PI / p);
        ctx.lineTo(0, 0 - (r * m));
        ctx.rotate(Math.PI / p);
        ctx.lineTo(0, 0 - r);
    }
    ctx.fillStyle = color;
    ctx.shadowBlur = 20;
    ctx.shadowColor = color;
    ctx.fill();
    ctx.restore();
}

class Asteroid {
    constructor() {
        this.r = Math.random() * 20 + 15;
        this.x = Math.random() * canvas.width;
        this.y = -50;
        this.isHard = progress > HARD_MODE_START;
        
        // Kiểu di chuyển
        this.type = Math.random() > 0.7 ? 'sin' : 'straight';
        
        // Vật lý: Ma sát và tốc độ
        this.baseSpeed = this.isHard ? 5 : 3;
        this.vy = (Math.random() * 2 + this.baseSpeed);
        this.friction = 0.99; // Ma sát nhẹ
        
        if(this.type === 'sin') {
            this.vy *= 0.6; // Chậm lại khi đi hình sin
            this.amplitude = Math.random() * 60 + 40;
            this.frequency = 0.02;
            this.offset = Math.random() * 100;
        }
        
        this.color = this.isHard ? '#ff0000' : '#b8860b'; // Viền đỏ hoặc vàng đậm
    }

    update() {
        this.vy *= this.friction; // Áp dụng ma sát
        if(this.vy < 1.5) this.vy = 1.5; // Tốc độ tối thiểu không bị dừng hẳn
        
        this.y += this.vy;
        
        let drawX = this.x;
        if(this.type === 'sin') {
            drawX += Math.sin(this.y * this.frequency + this.offset) * this.amplitude;
        }

        ctx.beginPath();
        ctx.arc(drawX, this.y, this.r, 0, Math.PI * 2);
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 3;
        ctx.stroke();
        
        // Lưu lại x để check va chạm chính xác
        this.currentX = drawX;
    }
}

function drawBackground() {
    // 1. Vẽ bầu trời sao tĩnh
    starsBG.forEach(s => {
        s.o += (Math.random() - 0.5) * 0.05;
        ctx.fillStyle = `rgba(255, 255, 255, ${Math.abs(s.o)})`;
        ctx.fillRect(s.x, s.y, s.s, s.s);
    });

    // 2. Hiệu ứng Nebula (vùng sáng mờ ảo)
    let grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.width);
    grad.addColorStop(0, 'rgba(10, 20, 50, 0)');
    grad.addColorStop(1, 'rgba(0, 0, 0, 0.8)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawUI() {
    // Thanh tiến trình
    const barW = canvas.width * 0.7;
    const barX = (canvas.width - barW) / 2;
    
    // Chữ TIẾN TRÌNH
    ctx.fillStyle = "#fff";
    ctx.font = "italic bold 12px Arial";
    ctx.textAlign = "left";
    ctx.fillText("TIẾN TRÌNH", barX, 25);
    
    // Viền thanh
    ctx.strokeStyle = "rgba(255,255,255,0.2)";
    ctx.strokeRect(barX, 35, barW, 6);
    
    // Lõi thanh
    let color = progress > HARD_MODE_START ? `hsl(${(Date.now()/5)%360}, 100%, 50%)` : "#fff200";
    ctx.fillStyle = color;
    ctx.fillRect(barX, 35, barW * progress, 6);

    // THANH MÁU (Hình trái tim)
    for(let i=0; i<3; i++) {
        let color = (i < star.hp) ? "#ff0000" : "rgba(255,255,255,0.2)";
        drawHeart(35 + i*35, 70, 10, color, i < star.hp);
    }
}

function drawEndZone() {
    // Vùng sáng khu vực đích (Làm mờ hóa)
    let grad = ctx.createRadialGradient(canvas.width/2, canvas.height*0.15, 20, canvas.width/2, canvas.height*0.15, 150);
    grad.addColorStop(0, 'rgba(255, 242, 0, 0.4)');
    grad.addColorStop(0.5, 'rgba(255, 242, 0, 0.1)');
    grad.addColorStop(1, 'rgba(255, 242, 0, 0)');
    
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(canvas.width/2, canvas.height*0.15, 150, 0, Math.PI*2);
    ctx.fill();
}

function loop() {
    let now = performance.now();
    let dt = now - lastTime;
    lastTime = now;

    drawBackground();

    if(currentGameState === STATE.PLAY) {
        elapsedTime += dt;
        progress = Math.min(elapsedTime / TOTAL_DURATION, 1);

        // Di chuyển mượt mà
        let ease = progress > HARD_MODE_START ? 0.2 : 0.12;
        star.x += (star.targetX - star.x) * ease;
        star.y += (star.targetY - star.y) * ease;
        star.angle += 0.05;

        // Xử lý Thiên thạch
        if(Math.random() < (progress > HARD_MODE_START ? 0.07 : 0.04)) {
            asteroids.push(new Asteroid());
        }

        // Check va chạm
        asteroids.forEach((a, i) => {
            a.update();
            let dx = star.x - a.currentX;
            let dy = star.y - a.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            
            if(dist < star.size + a.r && !star.invul) {
                star.hp--;
                star.invul = true;
                setTimeout(() => star.invul = false, 1000);
                asteroids.splice(i, 1);
                if(star.hp <= 0) currentGameState = STATE.DIE;
            }
            if(a.y > canvas.height + 50) asteroids.splice(i, 1);
        });

        if(progress >= 1) currentGameState = STATE.WIN_AUTO;
    }

    if(currentGameState === STATE.WIN_AUTO) {
        drawEndZone();
        // Chế độ tự động vào khu vực đích
        star.targetX = canvas.width/2;
        star.targetY = canvas.height*0.15;
        star.x += (star.targetX - star.x) * 0.05;
        star.y += (star.targetY - star.y) * 0.05;
        star.angle += 0.2;
        
        if(Math.abs(star.x - star.targetX) < 5) {
            currentGameState = STATE.FIREWORKS;
        }
    }

    // Vẽ Ngôi sao người chơi
    let starColor = progress > HARD_MODE_START ? `hsl(${(Date.now()/2)%360}, 100%, 50%)` : "#fff200";
    if(!star.invul || Math.floor(Date.now()/100)%2) {
        drawStar(star.x, star.y, star.size, 5, 0.4, star.angle, starColor);
    }

    drawUI();

    // Xử lý thua cuộc
    if(currentGameState === STATE.DIE) {
        fadeAlpha += 0.01;
        ctx.fillStyle = `rgba(0,0,0,${fadeAlpha})`;
        ctx.fillRect(0,0,canvas.width, canvas.height);
        
        ctx.fillStyle = "#fff";
        ctx.textAlign = "center";
        ctx.font = "bold 30px Arial";
        ctx.fillText("THUA", canvas.width/2, canvas.height/2);
        ctx.font = "16px Arial";
        ctx.fillText("Cố lên nào!", canvas.width/2, canvas.height/2 + 40);
        
        if(fadeAlpha >= 1) {
            setTimeout(() => {
                elapsedTime = 0;
                star.hp = 3;
                asteroids = [];
                fadeAlpha = 0;
                currentGameState = STATE.PLAY;
            }, 2000);
        }
    }

    requestAnimationFrame(loop);
}

// Điều khiển
window.addEventListener('mousemove', e => {
    star.targetX = e.clientX;
    star.targetY = e.clientY;
});
window.addEventListener('touchmove', e => {
    star.targetX = e.touches[0].clientX;
    star.targetY = e.touches[0].clientY;
});

loop();
</script>
</body>
</html>
