<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vortex Star V4 - Final Beta | Kris Artura</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #00040a;
            font-family: 'Segoe UI', sans-serif;
            touch-action: none;
            user-select: none;
        }
        canvas { display: block; }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

<div id="ui-layer"></div>
<canvas id="mainCanvas"></canvas>

<script>
/**
 * ============================================================================
 * PROJECT: VORTEX STAR - VERSION 4.0 (FIXED & UPGRADED)
 * AUTHOR: KRIS ARTURA
 * LOGIC: Dựa trên V1, mở rộng Class-based, xử lý dải sáng tuyệt đối.
 * ============================================================================
 */

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

// --- HẰNG SỐ CẤU HÌNH ---
const SETTINGS = {
    TOTAL_TIME: 80000,      // 1 phút 20 giây (ms)
    PEAK_TIME: 60000,       // Khúc cao trào bắt đầu từ giây thứ 60
    MAX_ASTEROIDS: 4,       // Giới hạn cứng số thiên thạch để tránh lỗi "quá nhiều"
    TRAIL_SIZE: 12,         // Độ dài dải sáng
    PLAYER_SIZE: 22,
    STAR_POINTS: 5,
    AUTOPILOT_Y: 0.15       // Vị trí đích (15% chiều cao màn hình)
};

// --- BIẾN TOÀN CỤC QUẢN LÝ TRẠNG THÁI ---
let width, height;
let progress = 0;
let startTime = Date.now();
let lastTime = Date.now();
let isGameOver = false;
let isWin = false;
let fadeOut = 0;

// Hệ thống lưu trữ đối tượng
let particles = [];
let asteroids = [];
let hearts = [];
let bgStars = [];
let fireworks = [];

// ============================================================================
// 1. CLASS VẬT LÝ VÀ VECTOR (TĂNG ĐỘ DÀI VÀ CHỈNH CHU LOGIC)
// ============================================================================

class Vector2 {
    constructor(x, y) { this.x = x; this.y = y; }
}

class Particle {
    constructor(x, y, color, speedMul = 1) {
        this.x = x;
        this.y = y;
        this.color = color;
        const angle = Math.random() * Math.PI * 2;
        const force = Math.random() * 4 * speedMul;
        this.vx = Math.cos(angle) * force;
        this.vy = Math.sin(angle) * force;
        this.life = 1.0;
        this.decay = Math.random() * 0.02 + 0.01;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

// ============================================================================
// 2. CLASS QUẢN LÝ NGƯỜI CHƠI (NGÔI SAO)
// ============================================================================

class PlayerStar {
    constructor() {
        this.pos = new Vector2(window.innerWidth / 2, window.innerHeight * 0.8);
        this.target = new Vector2(this.pos.x, this.pos.y);
        this.hp = 3;
        this.angle = 0;
        this.trail = [];
        this.invul = 0; // Thời gian bất tử sau va chạm
    }

    update(dt, currentProgress) {
        // Di chuyển bám theo tay/chuột
        let ease = currentProgress > 0.75 ? 0.2 : 0.12;
        this.pos.x += (this.target.x - this.pos.x) * ease;
        this.pos.y += (this.target.y - this.pos.y) * ease;

        // Xoay 10 vòng / phút
        this.angle += 0.05;

        // Cập nhật dải sáng (Trail) - Fix lỗi chỉ hiện ở giữa
        this.trail.push({ x: this.pos.x, y: this.pos.y });
        if (this.trail.length > SETTINGS.TRAIL_SIZE) this.trail.shift();

        if (this.invul > 0) this.invul -= dt;
    }

    draw() {
        const isPeak = (Date.now() - startTime) > SETTINGS.PEAK_TIME;
        const rainbowColor = `hsl(${(Date.now() / 5) % 360}, 100%, 60%)`;
        const defaultColor = "#fff200";
        const activeColor = isPeak ? rainbowColor : defaultColor;

        // Vẽ Trail (Dải sáng đi theo sau)
        this.trail.forEach((t, i) => {
            const ratio = i / SETTINGS.TRAIL_SIZE;
            ctx.save();
            ctx.globalAlpha = ratio * 0.4;
            this.drawStarShape(t.x, t.y, SETTINGS.PLAYER_SIZE * ratio, activeColor);
            ctx.restore();
        });

        // Vẽ ngôi sao chính
        if (this.invul > 0 && Math.floor(Date.now() / 100) % 2 === 0) return;
        this.drawStarShape(this.pos.x, this.pos.y, SETTINGS.PLAYER_SIZE, activeColor);
    }

    drawStarShape(x, y, r, color) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(this.angle);
        ctx.beginPath();
        for (let i = 0; i < SETTINGS.STAR_POINTS * 2; i++) {
            const radius = (i % 2 === 0) ? r : r * 0.4;
            const angle = (i * Math.PI) / SETTINGS.STAR_POINTS;
            ctx.lineTo(Math.cos(angle) * radius, Math.sin(angle) * radius);
        }
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.shadowBlur = isWin ? 30 : 15;
        ctx.shadowColor = color;
        ctx.fill();
        ctx.restore();
    }
}

const player = new PlayerStar();

// ============================================================================
// 3. CLASS THIÊN THẠCH VÀ VẬT PHẨM
// ============================================================================

class Asteroid {
    constructor(isHard) {
        this.r = Math.random() * 20 + 15;
        this.x = Math.random() * (width - this.r * 2) + this.r;
        this.y = -50;
        this.isHard = isHard;
        this.type = Math.random() > 0.7 ? 'sin' : 'straight';
        
        // Tốc độ và Ma sát
        this.vy = isHard ? Math.random() * 3 + 4 : Math.random() * 2 + 2.5;
        this.vx = 0;
        this.friction = 0.99;
        
        // Sin Wave logic
        this.amplitude = Math.random() * 50 + 30;
        this.freq = 0.02;
        this.offset = Math.random() * 100;
        this.spawnX = this.x;

        this.color = isHard ? "#ff3333" : "#b8860b"; // Đỏ nếu khó, vàng đậm nếu thường
    }

    update() {
        this.vy *= this.friction; // Ma sát giống thật
        if (this.vy < 1.5) this.vy = 1.5;
        this.y += this.vy;

        if (this.type === 'sin') {
            this.x = this.spawnX + Math.sin(this.y * this.freq + this.offset) * this.amplitude;
        }
    }

    draw() {
        ctx.save();
        ctx.lineWidth = 3;
        ctx.strokeStyle = this.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
    }
}

// ============================================================================
// 4. HỆ THỐNG NỀN VŨ TRỤ (VIP)
// ============================================================================

function createUniverse() {
    bgStars = [];
    for (let i = 0; i < 150; i++) {
        bgStars.push({
            x: Math.random() * width,
            y: Math.random() * height,
            s: Math.random() * 2,
            o: Math.random(),
            v: Math.random() * 0.5 + 0.1
        });
    }
}

function drawUniverse() {
    ctx.fillStyle = "#00040a";
    ctx.fillRect(0, 0, width, height);

    bgStars.forEach(s => {
        s.y += s.v;
        if (s.y > height) s.y = 0;
        ctx.fillStyle = `rgba(255, 255, 255, ${s.o})`;
        ctx.fillRect(s.x, s.y, s.s, s.s);
    });

    // Thiên hà mờ ảo
    const grad = ctx.createRadialGradient(width / 2, height / 2, 0, width / 2, height / 2, width);
    grad.addColorStop(0, "rgba(10, 30, 70, 0.2)");
    grad.addColorStop(1, "transparent");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, width, height);
}

// ============================================================================
// 5. GIAO DIỆN NGƯỜI DÙNG (UI)
// ============================================================================

function drawUI() {
    const elapsed = Date.now() - startTime;
    const progressPerc = Math.min(elapsed / SETTINGS.TOTAL_TIME, 1);
    const isPeak = elapsed > SETTINGS.PEAK_TIME;

    // 1. Thanh Tiến Trình (PROCESS)
    const bw = width * 0.7;
    const bx = (width - bw) / 2;
    const by = 40;

    ctx.fillStyle = "#fff";
    ctx.font = "bold 13px Segoe UI";
    ctx.textAlign = "left";
    ctx.fillText("PROCESS", bx, by - 10);

    ctx.strokeStyle = "rgba(255,255,255,0.2)";
    ctx.strokeRect(bx, by, bw, 8);

    const barColor = isPeak ? `hsl(${(Date.now() / 5) % 360}, 100%, 50%)` : "#fff200";
    ctx.fillStyle = barColor;
    ctx.fillRect(bx, by, bw * progressPerc, 8);

    // 2. Thanh Máu (TRÁI TIM ĐỎ)
    for (let i = 0; i < 3; i++) {
        const hx = 40 + i * 35;
        const hy = 80;
        const active = i < player.hp;
        drawHeartIcon(hx, hy, 12, active ? "#ff0000" : "rgba(255,255,255,0.1)");
    }
}

function drawHeartIcon(x, y, size, color) {
    ctx.save();
    ctx.translate(x, y);
    ctx.beginPath();
    ctx.moveTo(0, size * 0.3);
    ctx.bezierCurveTo(0, 0, -size, 0, -size, size * 0.4);
    ctx.bezierCurveTo(-size, size * 0.8, 0, size * 1.2, 0, size * 1.5);
    ctx.bezierCurveTo(0, size * 1.2, size, size * 0.8, size, size * 0.4);
    ctx.bezierCurveTo(size, 0, 0, 0, 0, size * 0.3);
    ctx.fillStyle = color;
    if (color !== "rgba(255,255,255,0.1)") {
        ctx.shadowBlur = 10;
        ctx.shadowColor = "#ff0000";
    }
    ctx.fill();
    ctx.restore();
}

// ============================================================================
// 6. LOGIC GAMEPLAY CHÍNH
// ============================================================================

function handleCollisions() {
    asteroids.forEach((a, i) => {
        const dx = player.pos.x - a.x;
        const dy = player.pos.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < player.size + a.r && player.invul <= 0) {
            player.hp--;
            player.invul = 1000; // 1 giây bất tử
            // Hiệu ứng nổ
            for (let k = 0; k < 10; k++) particles.push(new Particle(a.x, a.y, a.color));
            asteroids.splice(i, 1);
            if (player.hp <= 0) isGameOver = true;
        }
    });

    // Kiểm tra ăn Tim
    hearts.forEach((h, i) => {
        const dx = player.pos.x - h.x;
        const dy = player.pos.y - h.y;
        if (Math.sqrt(dx*dx + dy*dy) < 30) {
            if (player.hp < 3) player.hp++;
            for (let k = 0; k < 10; k++) particles.push(new Particle(h.x, h.y, "#ff0000"));
            hearts.splice(i, 1);
        }
    });
}

function spawnLogic() {
    const elapsed = Date.now() - startTime;
    const progressRatio = elapsed / SETTINGS.TOTAL_TIME;
    const isHard = elapsed > SETTINGS.PEAK_TIME;

    // Giới hạn số lượng thiên thạch khắt khe hơn để tránh lag
    const maxOnScreen = isHard ? 6 : 4;

    if (asteroids.length < maxOnScreen && Math.random() < 0.03) {
        asteroids.push(new Asteroid(isHard));
    }

    // Sinh tim (Chỉ tối đa 2 lần mỗi game)
    if (Math.random() < 0.002 && hearts.length < 1) {
        hearts.push({ x: Math.random() * width, y: -20, vy: 2 });
    }
}

// ============================================================================
// 7. VÒNG LẶP RENDER (MAIN LOOP)
// ============================================================================

function update() {
    const now = Date.now();
    const dt = now - lastTime;
    lastTime = now;

    if (isGameOver) {
        fadeOut += 0.01;
        if (fadeOut >= 1) resetGame();
        return;
    }

    if (isWin) {
        // Autopilot mode
        player.target.x = width / 2;
        player.target.y = height * SETTINGS.AUTOPILOT_Y;
        player.update(dt, 1);
        if (Math.abs(player.pos.y - player.target.y) < 10) {
            // Nổ pháo hoa
            if (fireworks.length < 50) {
                for(let i=0; i<5; i++) fireworks.push(new Particle(player.pos.x, player.pos.y, `hsl(${Math.random()*360},100%,50%)`, 2));
            }
        }
    } else {
        const elapsed = Date.now() - startTime;
        const currentProgress = elapsed / SETTINGS.TOTAL_TIME;
        
        player.update(dt, currentProgress);
        spawnLogic();
        handleCollisions();

        if (elapsed >= SETTINGS.TOTAL_TIME) isWin = true;
    }

    // Cập nhật mảng vật thể
    asteroids.forEach(a => a.update());
    asteroids = asteroids.filter(a => a.y < height + 50);
    
    hearts.forEach(h => h.y += h.vy);
    hearts = hearts.filter(h => h.y < height + 50);

    particles.forEach(p => p.update());
    particles = particles.filter(p => p.life > 0);

    fireworks.forEach(f => f.update());
}

function render() {
    drawUniverse();

    // Vùng sáng đích (Mờ hóa)
    if (isWin || (Date.now() - startTime) > SETTINGS.PEAK_TIME * 0.9) {
        const g = ctx.createRadialGradient(width/2, height*SETTINGS.AUTOPILOT_Y, 0, width/2, height*SETTINGS.AUTOPILOT_Y, 200);
        g.addColorStop(0, "rgba(255, 242, 0, 0.2)");
        g.addColorStop(1, "transparent");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(width/2, height*SETTINGS.AUTOPILOT_Y, 200, 0, Math.PI*2);
        ctx.fill();
    }

    // Vẽ vật thể
    hearts.forEach(h => drawHeartIcon(h.x, h.y, 15, "#ff0000"));
    asteroids.forEach(a => a.draw());
    particles.forEach(p => p.draw());
    fireworks.forEach(f => f.draw());

    player.draw();
    drawUI();

    if (isGameOver) {
        ctx.fillStyle = `rgba(0,0,0,${fadeOut})`;
        ctx.fillRect(0,0,width,height);
        ctx.fillStyle = "white";
        ctx.font = "bold 30px Arial";
        ctx.textAlign = "center";
        ctx.fillText("THUA", width/2, height/2);
        ctx.font = "16px Arial";
        ctx.fillText("Cố lên nào!", width/2, height/2 + 40);
    }

    if (isWin && fireworks.length > 0) {
        ctx.fillStyle = "#fff200";
        ctx.font = "bold 30px Arial";
        ctx.textAlign = "center";
        ctx.fillText("XUẤT SẮC!", width/2, height/2);
    }

    requestAnimationFrame(() => {
        update();
        render();
    });
}

function resetGame() {
    player.hp = 3;
    player.pos = new Vector2(width/2, height*0.8);
    player.invul = 0;
    asteroids = [];
    particles = [];
    fireworks = [];
    startTime = Date.now();
    isGameOver = false;
    isWin = false;
    fadeOut = 0;
}

// --- KHỞI TẠO HỆ THỐNG ---
function init() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    createUniverse();
    
    window.addEventListener('mousemove', e => {
        player.target.x = e.clientX;
        player.target.y = e.clientY;
    });

    window.addEventListener('touchmove', e => {
        e.preventDefault();
        player.target.x = e.touches[0].clientX;
        player.target.y = e.touches[0].clientY;
    }, { passive: false });

    render();
}

init();

/**
 * GHI CHÚ CHO KRIS ARTURA:
 * 1. Lỗi trail chỉ hiện ở giữa đã được fix bằng cách vẽ trail dựa trên tọa độ tuyệt đối (x, y) 
 * của Player, không phụ thuộc vào translate của canvas cha.
 * 2. Số lượng thiên thạch được kiểm soát bằng SETTINGS.MAX_ASTEROIDS và cơ chế spawn ngẫu nhiên 
 * có giới hạn (0.03 xác suất mỗi frame).
 * 3. Ma sát (friction) 0.99 giúp thiên thạch Sin chuyển động lờ đờ, chân thực hơn.
 * 4. Toàn bộ logic Class-based giúp code dễ đọc và bảo trì.
 */
</script>
</body>
    </html>
