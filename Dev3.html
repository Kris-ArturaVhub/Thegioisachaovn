<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #020202; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #fff;
            font-size: 18px; pointer-events: none; letter-spacing: 2px;
        }
        .neon-text { text-shadow: 0 0 10px #fff200, 0 0 20px #ff00de; }
    </style>
</head>
<body>

<div id="ui" class="neon-text">Score: <span id="score">0</span></div>
<canvas id="starGame"></canvas>

<script>
const canvas = document.getElementById('starGame');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
let obstacles = [];
let starAngle = 0;
// Mảng lưu vết dải sáng (tối ưu hiệu năng)
let trail = []; 

const star = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    size: 25,
    targetX: canvas.width / 2,
    targetY: canvas.height / 2
};

// Hàm vẽ ngôi sao 5 cánh
function drawStar(x, y, r, p, m, angle) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(0, 0 - r);
    for (let i = 0; i < p; i++) {
        ctx.rotate(Math.PI / p);
        ctx.lineTo(0, 0 - (r * m));
        ctx.rotate(Math.PI / p);
        ctx.lineTo(0, 0 - r);
    }
    ctx.fill();
    ctx.restore();
}

// Điều khiển tự do X, Y
function updatePosition(e) {
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    star.targetX = clientX;
    star.targetY = clientY;
}

window.addEventListener('touchmove', (e) => {
    e.preventDefault();
    updatePosition(e);
}, { passive: false });
window.addEventListener('mousemove', updatePosition);

class Asteroid {
    constructor() {
        this.r = Math.random() * 30 + 15; // Kích thước ngẫu nhiên
        this.x = Math.random() * canvas.width;
        this.y = -this.r;
        this.speed = Math.random() * 4 + 2; // Tốc độ ngẫu nhiên
        this.color = `rgba(255, 255, 255, ${Math.random() * 0.5 + 0.2})`;
    }
    update() {
        this.y += this.speed;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.strokeStyle = '#bc13fe';
        ctx.lineWidth = 2;
        ctx.stroke();
    }
}

function gameLoop() {
    // Tạo nền mờ dần để tạo hiệu ứng motion blur nhẹ
    ctx.fillStyle = 'rgba(2, 2, 2, 0.2)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 1. Cập nhật vị trí mượt mà (Easing)
    star.x += (star.targetX - star.x) * 0.15;
    star.y += (star.targetY - star.y) * 0.15;

    // 2. Xoay ngôi sao (10 vòng/phút = 1 độ/frame ở 60fps)
    starAngle += Math.PI / 180;

    // 3. Vẽ dải sáng (Trail) - Tối ưu: chỉ lưu 10 điểm gần nhất
    trail.push({x: star.x, y: star.y});
    if (trail.length > 12) trail.shift();
    
    trail.forEach((t, i) => {
        ctx.fillStyle = `rgba(255, 242, 0, ${i / 20})`;
        drawStar(t.x, t.y, star.size * (i / 12), 5, 0.5, starAngle);
    });

    // 4. Vẽ ngôi sao chính (Neon Gold)
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#fff200';
    ctx.fillStyle = '#fff200';
    drawStar(star.x, star.y, star.size, 5, 0.4, starAngle);
    ctx.shadowBlur = 0;

    // 5. Quản lý Thiên thạch (Giới hạn tối đa 4)
    if (obstacles.length < 4 && Math.random() < 0.03) {
        obstacles.push(new Asteroid());
    }

    obstacles.forEach((obs, i) => {
        obs.update();
        
        // Kiểm tra va chạm (Đơn giản bằng khoảng cách)
        const dx = star.x - obs.x;
        const dy = star.y - obs.y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        
        if (distance < star.size + obs.r) {
            // Hiệu ứng khi va chạm (tạm thời chỉ reset score)
            score = 0;
            scoreEl.innerText = score;
            obstacles.splice(i, 1);
        }

        if (obs.y > canvas.height + obs.r) {
            obstacles.splice(i, 1);
            score++;
            scoreEl.innerText = score;
        }
    });

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
