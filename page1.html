<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book UI</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: sans-serif;
}

body {
  background: #111;
  overflow: hidden;
}

.book {
  width: 100vw;
  height: 100vh;
  position: relative;
}

/* ===== PAGE ===== */
.page {
  position: absolute;
  width: 100%;
  height: 100%;
  overflow: hidden;
  transition: transform 0.6s ease;
}

.page.flipped {
  transform: translateX(-100%);
}

/* ===== LAYER ===== */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.25);
}

/* CONTENT (quan trọng) */
.content {
  position: relative;
  z-index: 10;
  color: white;
  padding: 60px 20px 20px;
}

/* ===== TITLE ===== */
h1 {
  font-size: 42px;
  text-shadow: 0 0 10px rgba(0,0,0,0.8);
}

/* ===== NÚT ===== */
.next-btn {
  position: absolute;
  bottom: 20px;
  right: 20px;
  font-size: 28px;
  color: white;
  cursor: pointer;
}

.close-btn {
  position: absolute;
  top: 10px;
  right: 15px;
  font-size: 28px;
  cursor: pointer;
}

/* ===== TEXT ===== */
.overlay-text {
  position: absolute;
  font-size: 24px;
}

/* ===== LAST ===== */
.last-controls {
  position: absolute;
  bottom: 20px;
  left: 20px;
}

button {
  padding: 10px 15px;
  margin-right: 10px;
  border: none;
  background: rgba(255,255,255,0.2);
  color: white;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="book">

  <!-- PAGE 1 -->
  <div class="page" id="page1">
    <div class="bg" style="background-image:url('1cd3124a89f9b5fdc7a8aee2bbea4926.png')"></div>
    <div class="overlay"></div>

    <div class="content">
      <h1>Thế giới mới</h1>

      <!-- nút nằm TRONG content -->
      <div class="next-btn" onclick="nextPage(0)">➜</div>
    </div>
  </div>

  <!-- PAGE 2 -->
  <div class="page" id="page2">
    <div class="bg" style="background-image:url('1cd3124a89f9b5fdc7a8aee2bbea4926.png')"></div>
    <div class="overlay"></div>

    <div class="content">
      <div class="close-btn" onclick="goHome()">✖</div>

      <div class="overlay-text" style="top:50%; left:30%;">
        Nội dung chữ ở đây
      </div>

      <div class="next-btn" onclick="nextPage(1)">➜</div>
    </div>
  </div>

  <!-- PAGE 3 -->
  <div class="page" id="page3">
    <div class="bg" style="background-image:url('1cd3124a89f9b5fdc7a8aee2bbea4926.png')"></div>
    <div class="overlay"></div>

    <div class="content">
      <div class="last-controls">
        <button onclick="goHome()">Trang chủ</button>
        <button onclick="restart()">Đọc lại</button>
      </div>
    </div>
  </div>

</div>

<script>
let pages = document.querySelectorAll(".page");

function nextPage(i) {
  pages[i].classList.add("flipped");
}

function goHome() {
  window.location.href = "index.html";
}

function restart() {
  pages.forEach(p => p.classList.remove("flipped"));
}
</script>

</body>
</html>
