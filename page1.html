<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book UI</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: sans-serif;
}

body {
  background: #111;
  overflow: hidden;
}

.book {
  width: 100vw;
  height: 100vh;
  perspective: 1500px;
  position: relative;
}

/* ===== PAGE ===== */
.page {
  position: absolute;
  width: 100%;
  height: 100%;
  overflow: hidden;
  transform-origin: left;
  transition: transform 1s ease;
}

.page.flipped {
  transform: rotateY(-180deg);
}

/* ===== LAYER ===== */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  z-index: 1;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  z-index: 2;
}

.content {
  position: relative;
  z-index: 3;
  color: white;
  padding: 40px;
}

/* ===== TITLE ===== */
h1 {
  font-size: 48px;
  font-weight: bold;
  text-shadow: 0 0 10px rgba(0,0,0,0.8);
}

/* ===== BUTTON ===== */
.next-btn {
  position: absolute;
  bottom: 20px;
  right: 20px;
  font-size: 24px;
  color: white;
  cursor: pointer;
  opacity: 0;
  transition: 1s;
  z-index: 4;
}

.next-btn.show {
  opacity: 1;
}

/* ===== CLOSE ===== */
.close-btn {
  position: absolute;
  top: 10px;
  right: 15px;
  font-size: 28px;
  cursor: pointer;
}

/* ===== TEXT OVER ===== */
.overlay-text {
  position: absolute;
  font-size: 24px;
}

/* ===== LAST ===== */
.last-controls {
  position: absolute;
  bottom: 20px;
  left: 20px;
}

button {
  padding: 10px 15px;
  margin-right: 10px;
  border: none;
  background: rgba(255,255,255,0.2);
  color: white;
  cursor: pointer;
  border-radius: 8px;
}

button:hover {
  background: rgba(255,255,255,0.4);
}
</style>
</head>

<body>

<div class="book">

  <!-- ===== PAGE 1 ===== -->
  <div class="page" id="page1">
    <div class="bg" style="background-image:url('1cd3124a89f9b5fdc7a8aee2bbea4926.png')"></div>
    <div class="overlay"></div>

    <div class="content">
      <h1>Thế giới mới</h1>
    </div>

    <div class="next-btn" id="next1">➜</div>
  </div>

  <!-- ===== PAGE 2 ===== -->
  <div class="page" id="page2">
    <div class="bg" style="background-image:url('1cd3124a89f9b5fdc7a8aee2bbea4926.png')"></div>
    <div class="overlay"></div>

    <div class="content">
      <div class="close-btn" onclick="goHome()">✖</div>

      <div class="overlay-text" style="top:50%; left:30%;">
        Nội dung chữ ở đây
      </div>
    </div>

    <div class="next-btn" id="next2">➜</div>
  </div>

  <!-- ===== PAGE 3 ===== -->
  <div class="page" id="page3">
    <div class="bg" style="background-image:url('1cd3124a89f9b5fdc7a8aee2bbea4926.png')"></div>
    <div class="overlay"></div>

    <div class="content">
      <div class="last-controls">
        <button onclick="goHome()">Trang chủ</button>
        <button onclick="restart()">Đọc lại</button>
      </div>
    </div>
  </div>

</div>

<script>
let pages = document.querySelectorAll(".page");

/* hiện nút sau 10s */
setTimeout(() => {
  document.getElementById("next1").classList.add("show");
}, 10000);

/* chuyển trang */
document.getElementById("next1").onclick = () => {
  pages[0].classList.add("flipped");
  document.getElementById("next1").style.display = "none";

  setTimeout(() => {
    document.getElementById("next2").classList.add("show");
  }, 1000);
};

document.getElementById("next2").onclick = () => {
  pages[1].classList.add("flipped");
};

/* về trang chủ */
function goHome() {
  window.location.href = "index.html";
}

/* đọc lại */
function restart() {
  pages.forEach(p => p.classList.remove("flipped"));

  document.getElementById("next1").style.display = "block";
  document.getElementById("next1").classList.remove("show");
  document.getElementById("next2").classList.remove("show");

  setTimeout(() => {
    document.getElementById("next1").classList.add("show");
  }, 10000);
}
</script>

</body>
</html>
