<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The gioi moi_TGSA</title>

<style>
  /* =========================================
     1. BIẾN CSS & CÀI ĐẶT CORE TỐI ƯU
  ========================================= */
  :root {
    --neon-cyan: #00f2ff;
    --neon-purple: #bc13fe;
    
    /* Thiết lập kính mờ (Glassmorphism) */
    --glass-bg: rgba(255, 255, 255, 0.07);
    --glass-border: rgba(255, 255, 255, 0.12);
    
    /* Tốc độ khung hình */
    --transition-speed: 0.85s;
    --font-main: 'Segoe UI', Roboto, sans-serif;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: var(--font-main);
    
    /* Loại bỏ highlight khi chạm trên mobile */
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background: #020202;
    overflow: hidden;
    color: white;
    height: 100vh;
  }

  /* =========================================
     2. HỆ THỐNG TRANG 3D (VORTEX ENGINE)
  ========================================= */
  .book {
    width: 100vw;
    height: 100vh;
    position: relative;
    perspective: 1500px; /* Độ sâu 3D */
  }

  .page {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    
    /* Hiệu ứng chuyển động mượt mà */
    transition: transform var(--transition-speed) cubic-bezier(0.6, 0, 0.4, 1),
                opacity var(--transition-speed) ease;
    transform-origin: left center;
    transform-style: preserve-3d;
    will-change: transform, opacity;
  }

  /* Trạng thái lật trang (Flipped) */
  .page.flipped {
    transform: translateX(-110%) rotateY(-45deg) scale(0.8);
    opacity: 0;
    pointer-events: none;
  }

  /* =========================================
     3. BẢN NÂNG CẤP BACKGROUND & OVERLAY
  ========================================= */
  .bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    filter: brightness(0.4) contrast(1.3);
    transition: transform 10s ease-out;
  }

  /* Hiệu ứng phóng to nhẹ khi chưa lật */
  .page:not(.flipped) .bg {
    transform: scale(1.15);
  }

  /* Overlay Nâng Cấp - Hiệu ứng Gradient Động */
  .premium-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      45deg, 
      rgba(0, 242, 255, 0.15), 
      rgba(188, 19, 254, 0.15)
    );
    mix-blend-mode: overlay;
    animation: bg-shift 8s infinite alternate;
    z-index: 4;
  }

  @keyframes bg-shift {
    0% { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(30deg); }
  }

  /* Lưới Particle */
  .particle-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 5;
    pointer-events: none;
  }

  /* Bóng tối tập trung vào giữa (Vignette) */
  .overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(
      circle at center, 
      transparent 0%, 
      rgba(0,0,0,0.85) 100%
    );
    z-index: 6;
  }

  /* =========================================
     4. THIẾT KẾ NỘI DUNG CHÍNH (CONTENT)
  ========================================= */
  .content {
    position: relative;
    z-index: 10;
    padding: 80px 25px 120px; 
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  h1 {
    font-size: 40px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 3px;
    text-shadow: 0 0 20px rgba(0, 242, 255, 0.6);
    margin-bottom: 10px;
  }

  .description {
    font-size: 18px;
    line-height: 1.6;
    background: var(--glass-bg);
    backdrop-filter: blur(15px);
    border: 1px solid var(--glass-border);
    padding: 20px;
    border-radius: 18px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
  }

  /* =========================================
     5. NÚT ĐIỀU HƯỚNG (ĐỒNG BỘ 100%)
  ========================================= */
  
  .nav-trigger {
    position: absolute;
    bottom: 85px; /* Giữ vị trí cao thêm 10px như bạn muốn */
    
    width: 60px;
    height: 60px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    z-index: 20;
    transition: all 0.3s ease;
    
    /* MỜ KHOẢNG 70% (Chỉ hiện 30%) - Áp dụng cho cả 2 nút */
    opacity: 0.3; 
  }

  /* Vị trí nút bên phải */
  .next-trigger {
    right: 25px;
  }

  /* Vị trí nút bên trái */
  .prev-trigger {
    left: 25px;
  }

  /* Hiệu ứng khi chạm/di chuột vào: Cả 2 đều sáng lên như nhau */
  .nav-trigger:hover, 
  .nav-trigger:active {
    opacity: 1;
    background: rgba(255, 255, 255, 0.15);
    transform: scale(1.1);
  }

  /* =========================================
     6. NÚT "TRỞ VỀ" ĐẶC BIỆT (TRANG CUỐI)
  ========================================= */
  .back-home-special {
    position: relative;
    padding: 18px 45px;
    font-size: 20px;
    font-weight: 800;
    color: #fff;
    background: transparent;
    border: 2px solid var(--neon-cyan);
    border-radius: 12px;
    cursor: pointer;
    overflow: hidden;
    transition: 0.5s;
    text-transform: uppercase;
    letter-spacing: 4px;
    box-shadow: 0 0 25px rgba(0, 242, 255, 0.4);
    margin: 0 auto;
    display: block;
    width: fit-content;
  }

  .back-home-special::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(
      90deg, 
      transparent, 
      rgba(255, 255, 255, 0.6), 
      transparent
    );
    transition: 0.6s;
  }

  .back-home-special:hover {
    background: var(--neon-cyan);
    color: #000;
    box-shadow: 0 0 50px var(--neon-cyan);
    transform: translateY(-5px) scale(1.05);
  }

  .back-home-special:active {
    animation: glitch 0.3s infinite;
  }

  @keyframes glitch {
    0% { transform: translate(0); }
    25% { transform: translate(-3px, 3px); }
    50% { transform: translate(3px, -3px); }
    75% { transform: translate(-3px, -3px); }
    100% { transform: translate(0); }
  }

  /* =========================================
     7. NÚT "THOÁT" Ở GÓC TRÊN
  ========================================= */
  .exit-btn {
    position: absolute;
    top: 25px;
    right: 25px;
    background: rgba(255, 50, 50, 0.15);
    border: 1px solid rgba(255, 50, 50, 0.4);
    padding: 10px 24px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: bold;
    text-transform: uppercase;
    backdrop-filter: blur(8px);
    cursor: pointer;
    transition: 0.3s;
    color: #ff8080;
    letter-spacing: 1px;
    z-index: 50;
  }

  .exit-btn:hover {
    background: rgba(255, 50, 50, 0.6);
    color: white;
    box-shadow: 0 0 20px rgba(255, 50, 50, 0.4);
  }

  /* =========================================
     8. BẢNG THÔNG BÁO TÁC GIẢ (TOAST)
  ========================================= */
  #toast {
    position: fixed;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    background: #111;
    border: 1px solid var(--neon-cyan);
    padding: 14px 30px;
    border-radius: 50px;
    color: var(--neon-cyan);
    font-weight: bold;
    z-index: 1000;
    box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
    transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  #toast.active { top: 40px; }

</style>
</head>

<body>

<div id="toast">Project by Kris Artura ⚡</div>

<div class="book" id="main-book">

  <div class="page">
    <div class="bg" style="background-image:url('1cd3124a89f9b5fdc7a8aee2bbea4926.png')"></div>
    <div class="premium-overlay"></div>
    <canvas class="particle-canvas"></canvas>
    <div class="overlay"></div>

    <div class="content">
      <div>
        <h1>Khởi Đầu</h1>
        <div class="description">
          Chào mừng bạn đến với giao diện đọc sách tương lai.<br>
          Vuốt trái hoặc nhấn mũi tên để tiếp tục.
        </div>
      </div>
      
      <div class="nav-trigger next-trigger" onclick="handleNext()">➜</div>
    </div>
  </div>

  <div class="page">
    <div class="bg" style="background-image:url('1cd3124a89f9b5fdc7a8aee2bbea4926.png')"></div>
    <div class="premium-overlay"></div>
    <canvas class="particle-canvas"></canvas>
    <div class="overlay"></div>

    <div class="content">
      <div>
        <h1>Khám Phá</h1>
        <div class="description">
          Hệ thống logic đã được tinh chỉnh!<br><br>
          Nút <b>Thoát</b> tự động gắn cho các trang đầu.<br>
          Nút <b>Trở về</b> được dành riêng cho trang cuối.
        </div>
      </div>
      
      <div class="nav-trigger prev-trigger" onclick="handlePrev()">⬅</div>
      <div class="nav-trigger next-trigger" onclick="handleNext()">➜</div>
    </div>
  </div>

  <div class="page">
    <div class="bg" style="background-image:url('1cd3124a89f9b5fdc7a8aee2bbea4926.png')"></div>
    <div class="premium-overlay"></div>
    <canvas class="particle-canvas"></canvas>
    <div class="overlay"></div>

    <div class="content" style="justify-content: center;">
      <div>
        <h1 style="text-align:center; margin-bottom: 40px;">Hoàn Thành</h1>
      </div>
      
      <div class="nav-trigger prev-trigger" onclick="handlePrev()">⬅</div>
    </div>
  </div>

</div>

<script>
  /* ==========================================
     PHẦN 1: CORE NAVIGATION (LẬT TRANG)
  ========================================== */
  const pages = document.querySelectorAll(".page");
  const book = document.getElementById("main-book");
  let currentPage = 0;

  pages.forEach((p, i) => p.style.zIndex = pages.length - i);

  function handleNext() {
    if (currentPage < pages.length - 1) {
      pages[currentPage].classList.add("flipped");
      currentPage++;
    }
  }

  function handlePrev() {
    if (currentPage > 0) {
      currentPage--;
      pages[currentPage].classList.remove("flipped");
    }
  }

  function actionRedirect() {
    window.location.href = "index.html";
  }

  /* ==========================================
     PHẦN 2: LOGIC TỰ ĐỘNG GẮN NÚT
  ========================================== */
  pages.forEach((page, index) => {
    const contentBox = page.querySelector('.content');

    if (index === pages.length - 1) {
      const backBtn = document.createElement('button');
      backBtn.className = 'back-home-special';
      backBtn.innerHTML = 'TRỞ VỀ';
      backBtn.onclick = actionRedirect;
      contentBox.appendChild(backBtn);
    } else {
      const exitBtn = document.createElement('div');
      exitBtn.className = 'exit-btn';
      exitBtn.innerText = 'Thoát';
      exitBtn.onclick = actionRedirect;
      contentBox.appendChild(exitBtn);
    }
  });

  /* ==========================================
     PHẦN 3: HIỆU ỨNG VORTEX PARTICLES
  ========================================== */
  function initParticles() {
    const canvases = document.querySelectorAll('.particle-canvas');
    
    canvases.forEach(canvas => {
      const ctx = canvas.getContext('2d');
      let w = canvas.width = window.innerWidth;
      let h = canvas.height = window.innerHeight;
      let particles = [];

      class Particle {
        constructor() {
          this.x = Math.random() * w;
          this.y = Math.random() * h;
          this.vx = (Math.random() - 0.5) * 0.8;
          this.vy = (Math.random() - 0.5) * 0.8;
          this.rad = Math.random() * 1.5 + 0.5;
          const isPurple = Math.random() > 0.5;
          this.color = isPurple ? 'rgba(188, 19, 254, 0.5)' : 'rgba(0, 242, 255, 0.5)';
        }
        
        update() {
          this.x += this.vx;
          this.y += this.vy;
          if (this.x < 0 || this.x > w) this.vx *= -1;
          if (this.y < 0 || this.y > h) this.vy *= -1;
        }
        
        draw() {
          ctx.fillStyle = this.color;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.rad, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      for (let i = 0; i < 45; i++) particles.push(new Particle());

      function render() {
        ctx.clearRect(0, 0, w, h);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(render);
      }
      render();
    });
  }

  /* ==========================================
     PHẦN 4: GESTURES (CẢM ỨNG VUỐT)
  ========================================== */
  let touchStartX = 0;
  document.addEventListener('touchstart', e => touchStartX = e.touches[0].clientX, { passive: true });
  document.addEventListener('touchend', e => {
    let diff = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 60) {
      if (diff > 0) handleNext();
      else handlePrev();
    }
  }, { passive: true });

  /* ==========================================
     PHẦN 5: KHỞI TẠO
  ========================================== */
  window.onload = () => {
    const toast = document.getElementById('toast');
    setTimeout(() => toast.classList.add('active'), 1000);
    setTimeout(() => toast.classList.remove('active'), 5000);
    initParticles();
  };

  window.onresize = () => initParticles();
</script>

</body>
      </html>
