<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book UI - Kris Artura Edition</title>

<style>
  /* =========================================
     1. CSS BIẾN & CÀI ĐẶT CƠ BẢN
  ========================================= */
  :root {
    --primary-glow: rgba(255, 255, 255, 0.6);
    --glass-bg: rgba(255, 255, 255, 0.1);
    --glass-border: rgba(255, 255, 255, 0.2);
    --transition-speed: 0.8s;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    -webkit-tap-highlight-color: transparent; 
  }

  body {
    background: #050505;
    overflow: hidden;
    color: white;
  }

  /* =========================================
     2. CONTAINER CHÍNH CỦA SÁCH
  ========================================= */
  .book {
    width: 100vw;
    height: 100vh;
    position: relative;
    perspective: 1200px; 
    overflow: hidden;
  }

  /* =========================================
     3. CẤU TRÚC TRANG SÁCH
  ========================================= */
  .page {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    transition: transform var(--transition-speed) cubic-bezier(0.645, 0.045, 0.355, 1),
                opacity var(--transition-speed) ease-in-out;
    transform-origin: left center;
    transform-style: preserve-3d;
    box-shadow: -5px 0 15px rgba(0,0,0,0.5);
  }

  .page.flipped {
    transform: translateX(-100%) rotateY(-30deg) scale(0.85);
    opacity: 0;
    pointer-events: none; 
  }

  /* Z-index sẽ được tự động gán bằng JS 
     để hỗ trợ số lượng trang vô hạn */

  /* =========================================
     4. HÌNH NỀN & LỚP PHỦ
  ========================================= */
  .bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    filter: brightness(0.8) contrast(1.2);
    transition: transform 5s ease; 
  }

  .page:hover .bg {
    transform: scale(1.05);
  }

  .particle-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 5;
    pointer-events: none;
  }

  .overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(
      to bottom, 
      rgba(0,0,0,0.1) 0%, 
      rgba(0,0,0,0.8) 100%
    );
    z-index: 6;
  }

  /* =========================================
     5. NỘI DUNG (CONTENT)
  ========================================= */
  .content {
    position: relative;
    z-index: 10;
    color: white;
    padding: 60px 30px 30px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  h1 {
    font-size: 48px;
    font-weight: 800;
    text-shadow: 0 4px 15px rgba(0,0,0,0.9);
    letter-spacing: 2px;
    animation: fadeInDown 1s ease-out;
  }

  /* =========================================
     6. NÚT BẤM VÀ UI CONTROLS
  ========================================= */
  .next-btn {
    position: absolute;
    bottom: 40px;
    right: 30px;
    font-size: 32px;
    color: white;
    cursor: pointer;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(10px);
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    transition: all 0.3s ease;
    animation: pulseGlow 2s infinite;
  }

  .next-btn:hover {
    background: rgba(255,255,255,0.25);
    transform: scale(1.1);
  }

  /* Nút thoát đã được nâng cấp thành nút chứa chữ */
  .close-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    background: rgba(255, 50, 50, 0.2);
    border: 1px solid rgba(255, 100, 100, 0.4);
    backdrop-filter: blur(5px);
    padding: 8px 18px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .close-btn:hover {
    background: rgba(255, 50, 50, 0.6);
    transform: scale(1.05);
  }

  .overlay-text {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 22px;
    line-height: 1.6;
    text-align: center;
    background: var(--glass-bg);
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(8px);
    border: 1px solid var(--glass-border);
    width: 80%;
    animation: fadeInUp 1s ease-out 0.3s backwards;
  }

  /* =========================================
     7. THÔNG BÁO (TOAST NOTIFICATION)
  ========================================= */
  #toast-container {
    position: fixed;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, rgba(20,20,20,0.9), rgba(50,50,50,0.9));
    border: 1px solid rgba(255,255,255,0.1);
    color: #00ffcc;
    padding: 15px 30px;
    border-radius: 30px;
    font-weight: bold;
    font-size: 16px;
    z-index: 9999;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    transition: top 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #toast-container.show {
    top: 40px;
  }

  /* =========================================
     8. ANIMATIONS (HIỆU ỨNG CHUYỂN ĐỘNG)
  ========================================= */
  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translate(-50%, -30px); }
    to { opacity: 1; transform: translate(-50%, -50%); }
  }

  @keyframes pulseGlow {
    0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.4); }
    70% { box-shadow: 0 0 0 15px rgba(255,255,255,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
  }

</style>
</head>

<body>

<div id="toast-container">
  <span>✨</span>
  <span id="toast-msg">Author: Kris Artura</span>
</div>

<div class="book" id="book-container">

  <div class="page">
    <div class="bg" style="background-image:url('1cd3124a89f9b5fdc7a8aee2bbea4926.png')"></div>
    <canvas class="particle-canvas"></canvas>
    <div class="overlay"></div>

    <div class="content">
      <h1>Thế giới mới</h1>
      <p style="margin-top:10px; opacity:0.8;">Vuốt sang trái hoặc nhấn nút để tiếp tục</p>
      
      <div class="next-btn" onclick="nextPage()">➜</div>
    </div>
  </div>

  <div class="page">
    <div class="bg" style="background-image:url('1cd3124a89f9b5fdc7a8aee2bbea4926.png')"></div>
    <canvas class="particle-canvas"></canvas>
    <div class="overlay"></div>

    <div class="content">
      <div class="overlay-text">
        Nội dung chữ ở đây.<br>
        <span style="font-size: 16px; opacity: 0.7; margin-top: 10px; display: block;">
          Nút "Thoát" sẽ được tự động thêm vào góc phải trang này bằng mã JS.
        </span>
      </div>

      <div class="next-btn" onclick="nextPage()">➜</div>
    </div>
  </div>

  <div class="page">
    <div class="bg" style="background-image:url('1cd3124a89f9b5fdc7a8aee2bbea4926.png')"></div>
    <canvas class="particle-canvas"></canvas>
    <div class="overlay"></div>

    <div class="content" style="justify-content: center; align-items: center;">
      <h1 style="text-align:center; margin: 0;">Hoàn Thành</h1>
    </div>
  </div>

</div>
<script>
  // ==========================================
  // PHẦN 1: QUẢN LÝ LẬT TRANG & Z-INDEX ĐỘNG
  // ==========================================
  const pages = document.querySelectorAll(".page");
  let currentPageIndex = 0;

  // Tự động sắp xếp z-index để trang 1 luôn ở trên cùng
  // Điều này giúp bạn thêm bao nhiêu trang tùy thích mà không sợ đè lớp
  pages.forEach((page, index) => {
    page.style.zIndex = pages.length - index;
  });

  function nextPage() {
    if (currentPageIndex >= 0 && currentPageIndex < pages.length - 1) {
      pages[currentPageIndex].classList.add("flipped");
      currentPageIndex++;
    }
  }

  function prevPage() {
    if (currentPageIndex > 0) {
      currentPageIndex--;
      pages[currentPageIndex].classList.remove("flipped");
    }
  }

  function goHome() {
    // Chuyển hướng về trang chủ
    console.log("Redirecting to index.html...");
    // window.location.href = "index.html"; 
    alert("Đang về trang chủ!");
  }

  // ==========================================
  // PHẦN 2: TỰ ĐỘNG THÊM NÚT "THOÁT"
  // ==========================================
  // Vòng lặp duyệt qua tất cả các trang
  pages.forEach((page, index) => {
    // Nếu KHÔNG PHẢI là trang cuối cùng
    if (index !== pages.length - 1) {
      const contentDiv = page.querySelector('.content');
      
      // Tạo một phần tử div làm nút thoát
      const exitBtn = document.createElement('div');
      exitBtn.className = 'close-btn';
      exitBtn.innerText = 'Thoát';
      exitBtn.onclick = goHome;
      
      // Gắn nút thoát vào trong thẻ content
      contentDiv.appendChild(exitBtn);
    }
  });

  // ==========================================
  // PHẦN 3: THÔNG BÁO (TOAST) AUTHOR
  // ==========================================
  function showToast(message) {
    const toast = document.getElementById("toast-container");
    const msgElement = document.getElementById("toast-msg");
    
    msgElement.innerText = message;
    toast.classList.add("show");
    
    setTimeout(() => {
      toast.classList.remove("show");
    }, 3500);
  }

  window.onload = () => {
    showToast("UI Developed by Kris Artura 🚀");
    initParticles();
  };

  // ==========================================
  // PHẦN 4: VUỐT CẢM ỨNG (SWIPE GESTURE)
  // ==========================================
  let touchStartX = 0;
  let touchEndX = 0;
  const swipeThreshold = 50; 

  const bookContainer = document.getElementById('book-container');

  bookContainer.addEventListener('touchstart', e => {
    touchStartX = e.changedTouches[0].screenX;
  }, {passive: true});

  bookContainer.addEventListener('touchend', e => {
    touchEndX = e.changedTouches[0].screenX;
    handleSwipe();
  }, {passive: true});

  function handleSwipe() {
    let diffX = touchStartX - touchEndX;
    
    if (diffX > swipeThreshold) {
      nextPage();
    }
    else if (diffX < -swipeThreshold) {
      prevPage();
    }
  }

  // ==========================================
  // PHẦN 5: HIỆU ỨNG HẠT (PARTICLES VORTEX)
  // ==========================================
  function initParticles() {
    const canvases = document.querySelectorAll('.particle-canvas');
    
    canvases.forEach(canvas => {
      const ctx = canvas.getContext('2d');
      let width, height;
      let particlesArray = [];
      const numberOfParticles = 40; 

      function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      class Particle {
        constructor() {
          this.x = Math.random() * width;
          this.y = Math.random() * height;
          this.size = Math.random() * 2 + 1;
          this.speedX = Math.random() * 1 - 0.5;
          this.speedY = Math.random() * 1 - 0.5;
          this.color = 'rgba(255, 255, 255, 0.5)';
        }
        
        update() {
          this.x += this.speedX;
          this.y += this.speedY;

          if (this.x > width || this.x < 0) this.speedX *= -1;
          if (this.y > height || this.y < 0) this.speedY *= -1;
        }

        draw() {
          ctx.fillStyle = this.color;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function init() {
        particlesArray = [];
        for (let i = 0; i < numberOfParticles; i++) {
          particlesArray.push(new Particle());
        }
      }

      function animate() {
        ctx.clearRect(0, 0, width, height);
        for (let i = 0; i < particlesArray.length; i++) {
          particlesArray[i].update();
          particlesArray[i].draw();
        }
        requestAnimationFrame(animate);
      }

      init();
      animate();
    });
  }
</script>

</body>
  </html>
