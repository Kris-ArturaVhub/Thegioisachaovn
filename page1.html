<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book UI - Kris Artura Edition</title>

<style>
  /* =========================================
     1. BIẾN CSS & CÀI ĐẶT GIAO DIỆN
  ========================================= */
  :root {
    --neon-cyan: #00f2ff;
    --neon-blue: #0072ff;
    --glass: rgba(255, 255, 255, 0.08);
    --border: rgba(255, 255, 255, 0.15);
    --speed: 0.8s;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background: #000;
    overflow: hidden;
    color: white;
  }

  /* =========================================
     2. CẤU TRÚC SÁCH & HIỆU ỨNG LẬT 3D
  ========================================= */
  .book {
    width: 100vw;
    height: 100vh;
    position: relative;
    perspective: 1500px;
  }

  .page {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    transition: transform var(--speed) cubic-bezier(0.645, 0.045, 0.355, 1),
                opacity var(--speed) ease;
    transform-origin: left center;
    transform-style: preserve-3d;
    box-shadow: -10px 0 30px rgba(0,0,0,0.5);
  }

  /* Trang đã lật: Bay sang trái và xoay */
  .page.flipped {
    transform: translateX(-100%) rotateY(-40deg) scale(0.8);
    opacity: 0;
    pointer-events: none;
  }

  /* =========================================
     3. NỀN, HẠT VÀ LỚP PHỦ
  ========================================= */
  .bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    filter: brightness(0.6);
  }

  .particle-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 5;
    pointer-events: none;
  }

  .overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.9));
    z-index: 6;
  }

  /* =========================================
     4. NỘI DUNG VÀ CHỮ
  ========================================= */
  .content {
    position: relative;
    z-index: 10;
    padding: 70px 25px 30px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  h1 {
    font-size: 42px;
    font-weight: 900;
    text-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
    margin-bottom: 15px;
  }

  .overlay-text {
    background: var(--glass);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    padding: 20px;
    border-radius: 15px;
    font-size: 18px;
    line-height: 1.6;
  }

  /* =========================================
     5. NÚT "TRỞ VỀ" (TRANG CUỐI)
  ========================================= */
  .back-btn-special {
    position: relative;
    margin-top: 30px;
    padding: 15px 35px;
    font-size: 18px;
    font-weight: bold;
    color: #fff;
    background: transparent;
    border: 2px solid var(--neon-cyan);
    border-radius: 50px;
    cursor: pointer;
    overflow: hidden;
    transition: 0.4s;
    text-transform: uppercase;
    letter-spacing: 2px;
    box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
    align-self: center; /* Căn giữa nút */
  }

  /* Hiệu ứng Liquid Glow chảy qua nút */
  .back-btn-special::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0, 242, 255, 0.5), transparent);
    transition: 0.6s;
  }

  .back-btn-special:hover {
    background: var(--neon-cyan);
    color: #000;
    box-shadow: 0 0 40px var(--neon-cyan);
    transform: scale(1.1);
  }

  .back-btn-special:hover::before {
    left: 100%;
  }

  /* =========================================
     6. NÚT "THOÁT" VÀ NÚT "TIẾP"
  ========================================= */
  .close-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(255, 0, 0, 0.15);
    border: 1px solid rgba(255, 0, 0, 0.4);
    padding: 8px 18px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: bold;
    text-transform: uppercase;
    backdrop-filter: blur(5px);
    cursor: pointer;
    transition: 0.3s;
  }

  .close-btn:hover {
    background: rgba(255, 0, 0, 0.5);
  }

  .next-btn {
    position: absolute;
    bottom: 30px;
    right: 30px;
    width: 60px;
    height: 60px;
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(255,255,255,0.1);
    animation: bounce 2s infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  /* =========================================
     7. THÔNG BÁO TOAST (AUTHOR)
  ========================================= */
  #toast {
    position: fixed;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.85);
    border: 1px solid var(--neon-cyan);
    padding: 12px 25px;
    border-radius: 30px;
    color: var(--neon-cyan);
    font-weight: bold;
    z-index: 1000;
    transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  #toast.show { top: 30px; }

</style>
</head>

<body>

<div id="toast">Author: Kris Artura 🚀</div>

<div class="book" id="book-container">

  <div class="page">
    <div class="bg" style="background-image:url('1cd3124a89f9b5fdc7a8aee2bbea4926.png')"></div>
    <canvas class="particle-canvas"></canvas>
    <div class="overlay"></div>

    <div class="content">
      <h1>Thế Giới Mới</h1>
      <p style="opacity: 0.7;">Khám phá giao diện siêu vip pro của Kris Artura.</p>
      <div class="next-btn" onclick="nextPage()">➜</div>
    </div>
  </div>

  <div class="page">
    <div class="bg" style="background-image:url('1cd3124a89f9b5fdc7a8aee2bbea4926.png')"></div>
    <canvas class="particle-canvas"></canvas>
    <div class="overlay"></div>

    <div class="content">
      <div class="overlay-text">
        Các trang nội dung sẽ tự động có nút <b>THOÁT</b>.<br><br>
        Nhưng trang cuối cùng sẽ chỉ có nút <b>TRỞ VỀ</b> với hiệu ứng rực rỡ.
      </div>
      <div class="next-btn" onclick="nextPage()">➜</div>
    </div>
  </div>

  <div class="page">
    <div class="bg" style="background-image:url('1cd3124a89f9b5fdc7a8aee2bbea4926.png')"></div>
    <canvas class="particle-canvas"></canvas>
    <div class="overlay"></div>

    <div class="content" style="justify-content: center; align-items: center;">
      <h1 style="margin-bottom: 20px;">HOÀN THÀNH</h1>
      </div>
  </div>

</div>

<script>
  /* ==========================================
     PHẦN 1: QUẢN LÝ LẬT TRANG
  ========================================== */
  const pages = document.querySelectorAll(".page");
  let currentPage = 0;

  // Tự động sắp xếp chiều sâu z-index
  pages.forEach((p, i) => p.style.zIndex = pages.length - i);

  function nextPage() {
    if (currentPage < pages.length - 1) {
      pages[currentPage].classList.add("flipped");
      currentPage++;
    }
  }

  function prevPage() {
    if (currentPage > 0) {
      currentPage--;
      pages[currentPage].classList.remove("flipped");
    }
  }

  function goHome() {
    window.location.href = "index.html";
  }

  /* ==========================================
     PHẦN 2: LOGIC TỰ ĐỘNG GẮN NÚT (QUAN TRỌNG)
  ========================================== */
  pages.forEach((page, index) => {
    const contentArea = page.querySelector('.content');

    // NẾU LÀ TRANG CUỐI CÙNG
    if (index === pages.length - 1) {
      const backBtn = document.createElement('button');
      backBtn.className = 'back-btn-special';
      backBtn.innerText = 'Trở về';
      backBtn.onclick = goHome;
      
      contentArea.appendChild(backBtn);
    } 
    // NẾU KHÔNG PHẢI TRANG CUỐI (Trang 1, 2,...)
    else {
      const exitBtn = document.createElement('div');
      exitBtn.className = 'close-btn';
      exitBtn.innerText = 'Thoát';
      exitBtn.onclick = goHome;
      
      contentArea.appendChild(exitBtn);
    }
  });

  /* ==========================================
     PHẦN 3: HIỆU ỨNG HẠT (VORTEX)
  ========================================== */
  function initParticles() {
    const canvases = document.querySelectorAll('.particle-canvas');
    canvases.forEach(canvas => {
      const ctx = canvas.getContext('2d');
      let w = canvas.width = window.innerWidth;
      let h = canvas.height = window.innerHeight;
      let particles = [];

      class Particle {
        constructor() {
          this.x = Math.random() * w;
          this.y = Math.random() * h;
          this.vx = (Math.random() - 0.5) * 0.6;
          this.vy = (Math.random() - 0.5) * 0.6;
          this.size = Math.random() * 2;
        }
        update() {
          this.x += this.vx;
          this.y += this.vy;
          if (this.x < 0 || this.x > w) this.vx *= -1;
          if (this.y < 0 || this.y > h) this.vy *= -1;
        }
        draw() {
          ctx.fillStyle = 'rgba(0, 242, 255, 0.4)';
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      for (let i = 0; i < 35; i++) particles.push(new Particle());

      function animate() {
        ctx.clearRect(0, 0, w, h);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
      }
      animate();
    });
  }

  /* ==========================================
     PHẦN 4: CẢM ỨNG VUỐT & KHỞI CHẠY
  ========================================== */
  let startX = 0;
  document.addEventListener('touchstart', e => startX = e.touches[0].clientX);
  document.addEventListener('touchend', e => {
    let diff = startX - e.changedTouches[0].clientX;
    if (diff > 50) nextPage();
    if (diff < -50) prevPage();
  });

  window.onload = () => {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 4000);
    initParticles();
  };
</script>

</body>
  </html>
