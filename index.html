<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Website</title>

  <style>
    /* Nền toàn trang */
    body {
      margin: 0;
      font-family: Arial;
      background: url("1cd3124a89f9b5fdc7a8aee2bbea4926.png") no-repeat center/cover;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Khung trắng chính */
    .container {
      background: white;
      width: 90%;
      max-width: 5000px;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      text-align: center;
    }

    /* Tiêu đề */
    h1 {
      margin-bottom: 10px;
    }

    p {
      color: gray;
      margin-bottom: 20px;
    }

    /* Ma trận */
    .grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Ô */
    .card {
      background: #f0f0f0;
      padding: 15px;
      position: relative;
      overflow: hidden;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
      text-decoration: none;
      color: black;
      font-weight: bold;
    }

    .card:hover {
      background: #ddd;
    }
    .card::before {
  content: "";
  position: absolute;
  top: -100%;
  left: -100%;
  width: 200%;
  height: 200%;

  background: linear-gradient(
    120deg,
    transparent 40%,
    rgba(255,255,255,0.6) 50%,
    transparent 60%
  );

  transform: rotate(25deg);

  animation: shine 2s linear infinite;
}

@keyframes shine {
  from {
    transform: translate(-100%, -100%) rotate(25deg);
  }
  to {
    transform: translate(100%, 100%) rotate(25deg);
  }
    }
    
  </style>
</head>

<body>

  <div class="container">
    <h1> Thế giới sách ảo Việt Nam </h1>
    <p> Chọn sách bên dưới: </p>

    <div class="grid">
      <a href="page1.html" class="card"> Thế giới mới - Truyện ngắn</a>
      <a href="page2.html" class="card">Tên 2</a>
      <a href="page3.html" class="card">Tên 3</a>
      <a href="page4.html" class="card">Tên 4</a>
    </div>
  </div>

</body>
</html>
