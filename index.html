<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VIP UI</title>

<style>
/* ===== BODY ===== */
body {
  margin: 0;
  font-family: Arial;
  background: url("1cd3124a89f9b5fdc7a8aee2bbea4926.png") no-repeat center/cover;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

/* overlay nền */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(6px);
}

/* ===== CONTAINER ===== */
.container {
  position: relative;
  z-index: 1;
  width: 90%;
  max-width: 700px;
  padding: 25px;

  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);

  border-radius: 20px;
  color: white;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  text-align: center;
}

/* ===== GRID ===== */
.grid {
  display: grid;
  gap: 12px;
}

/* ===== CARD ===== */
.card {
  background: rgba(255,255,255,0.15);
  padding: 15px;
  border-radius: 15px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: 0.3s;
}

/* ===== BADGE GROUP (quan trọng) ===== */
.badges {
  position: absolute;
  top: 8px;
  right: 10px;
  display: flex;
  gap: 5px; /* khoảng cách giữa badge */
}

/* ===== BADGE CHUNG ===== */
.badge {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 6px;
  font-weight: bold;
  color: white;
}

/* NEW */
.badge.new {
  background: red;
}

/* HOT */
.badge.hot {
  background: orange;
  animation: pulse 1.5s infinite;
}

/* VIP (cầu vồng) */
.badge.vip {
  background: linear-gradient(
    45deg,
    red, orange, yellow, green, cyan, blue, violet
  );
  background-size: 300%;
  animation: rainbow 4s linear infinite;
  color: black;
}

/* ===== ANIMATION ===== */
@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}

@keyframes rainbow {
  0% { background-position: 0% }
  50% { background-position: 100% }
  100% { background-position: 1% }
}

/* ===== EXPAND ===== */
.card.active {
  transform: scale(1.05);
  background: rgba(255,255,255,0.9);
}

/* ===== DESC ===== */
.desc {
  max-height: 0;
  overflow: hidden;
  transition: 0.3s;
  font-size: 14px;
}

.card.active .desc {
  max-height: 100px;
  margin-top: 15px;
}

/* ===== BUTTON ===== */
.read-btn {
  display: inline-block;
  margin-top: 13px;
  padding: 15px 30px;
  background: cyan;
  color: black;
  border-radius: 6px;
  text-decoration: none;
  font-weight: bold;
  font-size: 18px;
}

/* ===== SHINE ===== */
.shine::before {
  content: "";
  position: absolute;
  top: -100%;
  left: -100%;
  width: 200%;
  height: 200%;

  background: linear-gradient(
    120deg,
    transparent 40%,
    rgba(255,255,255,0.4) 50%,
    transparent 60%
  );

  transform: rotate(25deg);
  animation: shine 3s linear infinite;
}

@keyframes shine {
  from {
    transform: translate(-100%, -100%) rotate(25deg);
  }
  to {
    transform: translate(100%, 100%) rotate(25deg);
  }
}
colo1 {
  color: black;
}
</style>
</head>

<body>

<div class="container">
  <h2>📚 Thế giới sách ảo</h2>
  <p>Chọn sách:</p>

  <div class="grid">

    <!-- CARD 1 -->
    <div class="card shine colo1" onclick="toggle(this)">
      <div class="badges">
        <span class="badge new">NEW</span>
        <span class="badge hot">HOT</span>
        <span class="badge vip">VIP</span>
      </div>
      Thế giới mới - Truyện ngắn 
      <div class="desc">
        văn bản 1 với đề tài là hình ảnh thiên nhiên và con người 
        <br>
        <a href="page1.html" class="read-btn">Đọc</a>
      </div>
    </div>

    <!-- CARD 2 -->
    <div class="card" onclick="toggle(this)">
      <div class="badges">
        <span class="badge hot">HOT</span>
      </div>
      sắp có...
      <div class="desc">
        Mô tả...
        <br>
        <a href="page2.html" class="read-btn">Đọc</a>
      </div>
    </div>

    <!-- CARD 3 -->
    <div class="card" onclick="toggle(this)">
      <div class="badges">
        <span class="badge vip">VIP</span>
      </div>
      sắp có...
      <div class="desc">
        Mô tả...
        <br>
        <a href="page3.html" class="read-btn">Đọc</a>
      </div>
    </div>

    <!-- CARD 4 -->
    <div class="card" onclick="toggle(this)">
        sắp có...
      <div class="desc">
        Mô tả...
        <br>
        <a href="page4.html" class="read-btn">Đọc</a>
      </div>
    </div>

  </div>
</div>

<script>
function toggle(card) {
  document.querySelectorAll(".card").forEach(c => {
    if (c !== card) c.classList.remove("active");
  });
  card.classList.toggle("active");
}
</script>

</body>
</html>
