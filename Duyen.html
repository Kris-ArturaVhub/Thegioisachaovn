<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duyên Của Trời - Kris Artura Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Charm:wght@400;700&family=Dancing+Script:wght@700&family=Montserrat:wght@900&family=Pacifico&family=Saira+Stencil+One&display=swap" rel="stylesheet">
    
    <style>
        /* PROJECT: VORTEX LYRIC ENGINE V4
           AUTHOR: KRIS ARTURA
           STYLE: CAPCUT PROFESSIONAL TYPOGRAPHY
        */

        :root {
            --color-1: #ff0055;
            --color-2: #00e5ff;
            --color-3: #ffae00;
            --glow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            overflow: hidden;
        }

        body {
            background-color: #000;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            width: 100vw;
        }

        /* --- BACKGROUND LAYER --- */
        #stage-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-image: url('1cd3124a89f9b5fdc7a8aee2bbea4926.png');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 12s cubic-bezier(0.1, 0, 0.3, 1);
        }

        #stage-container.zoom-active {
            transform: scale(1.15); /* Zoom nhẹ khi phát để tạo chiều sâu */
        }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.7) 100%);
            z-index: 1;
        }

        /* --- LYRIC RENDERER --- */
        #lyric-stage {
            position: relative;
            z-index: 10;
            width: 90%;
            text-align: center;
            perspective: 1000px;
        }

        .lyric-wrapper {
            display: inline-block;
            transition: all 0.5s ease;
        }

        /* --- ANIMATION LIBRARY (CAPCUT STYLE) --- */

        /* 1. Zoom & Blur (Huyền ảo) */
        .anim-focus {
            animation: focusIn 0.8s forwards;
        }
        @keyframes focusIn {
            0% { filter: blur(30px); opacity: 0; transform: scale(2) translateZ(100px); }
            100% { filter: blur(0); opacity: 1; transform: scale(1) translateZ(0); }
        }

        /* 2. Slide Up & Fade (Mượt mà) */
        .anim-slide-up {
            animation: slideUpFade 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }
        @keyframes slideUpFade {
            0% { transform: translateY(100px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* 3. Glitch Distortion (Mạnh mẽ) */
        .anim-glitch {
            animation: glitchText 0.4s infinite;
            text-shadow: 3px 0 var(--color-1), -3px 0 var(--color-2);
        }
        @keyframes glitchText {
            0% { transform: translate(0); }
            25% { transform: translate(-2px, 2px); }
            50% { transform: translate(2px, -2px); }
            75% { transform: translate(-2px, -2px); }
            100% { transform: translate(0); }
        }

        /* 4. Rainbow Wave (Nổi bật) */
        .anim-rainbow {
            background: linear-gradient(to right, #ff0055, #00e5ff, #73ff00, #ffae00, #ff0055);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbowShift 2s linear infinite, focusIn 0.5s forwards;
        }
        @keyframes rainbowShift { to { background-position: 200% center; } }

        /* 5. Letter Spacing (Nghệ thuật) */
        .anim-tracking {
            animation: trackingOut 3s ease-out forwards;
        }
        @keyframes trackingOut {
            0% { letter-spacing: -0.5em; opacity: 0; }
            100% { letter-spacing: 0.2em; opacity: 1; }
        }

        /* --- UI CONTROLS --- */
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .btn-main {
            padding: 15px 50px;
            font-size: 20px;
            background: transparent;
            color: white;
            border: 2px solid white;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.3s;
            font-weight: bold;
        }

        .btn-main:hover {
            background: white;
            color: black;
            box-shadow: 0 0 30px #fff;
        }

        .nav-btn {
            position: absolute;
            bottom: 30px;
            z-index: 50;
            padding: 10px 25px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            backdrop-filter: blur(5px);
            cursor: pointer;
            font-size: 14px;
        }

        #btn-exit { left: 30px; }
        #btn-return { right: 30px; display: none; }

        #progress-bar {
            position: absolute;
            top: 0; left: 0; height: 3px;
            background: var(--color-2);
            width: 0%;
            z-index: 200;
        }
    </style>
</head>
<body>

    <div id="progress-bar"></div>

    <div id="start-screen">
        <h1 style="font-family: 'Charm'; font-size: 3.5rem; margin-bottom: 20px;">Duyên Của Trời</h1>
        <p style="margin-bottom: 30px; opacity: 0.6;">Dự án bởi Kris Artura</p>
        <button class="btn-main" id="btn-play">PHÁT VIDEO</button>
    </div>

    <div id="stage-container">
        <div id="overlay"></div>
        
        <div id="lyric-stage">
            <div id="text-display" class="lyric-wrapper"></div>
        </div>

        <button id="btn-exit" class="nav-btn" onclick="location.reload()">Thoát</button>
        <button id="btn-return" class="nav-btn" onclick="resetVideo()">Trở về</button>
    </div>

    <audio id="bg-music">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        /**
         * LOGIC ENGINE - DEVELOPED BY KRIS ARTURA
         * Tập trung vào độ chính xác của Timeline và hiệu ứng chữ.
         */

        const audio = document.getElementById('bg-music');
        const playBtn = document.getElementById('btn-play');
        const startScreen = document.getElementById('start-screen');
        const stage = document.getElementById('stage-container');
        const textDisplay = document.getElementById('text-display');
        const returnBtn = document.getElementById('btn-return');
        const progressBar = document.getElementById('progress-bar');

        // --- LỜI NHẠC CHI TIẾT (Timeline chính xác) ---
        const lyrics = [
            { start: 1.0, end: 3.5, text: "Duyên của trời", anim: "anim-focus", font: "'Pacifico'", size: "8vw", color: "#fff" },
            { start: 4.0, end: 6.0, text: "Trao cho ta một cơ hội", anim: "anim-slide-up", font: "'Charm'", size: "6vw", color: "#00e5ff" },
            { start: 6.5, end: 9.0, text: "CÓ CÔNG MÀI SẮT", anim: "anim-glitch", font: "'Anton'", size: "9vw", color: "#ff0055" },
            { start: 9.2, end: 12.5, text: "CÓ NGÀY NÊN DUYÊN", anim: "anim-rainbow", font: "'Montserrat'", size: "10vw", color: "#fff" },
            { start: 13.0, end: 16.0, text: "Tình nồng nàn thắm thiết", anim: "anim-tracking", font: "'Dancing Script'", size: "7vw", color: "#ffae00" },
            { start: 16.5, end: 20.0, text: "Kris Artura Production", anim: "anim-focus", font: "'Saira Stencil One'", size: "4vw", color: "#888" }
        ];

        let isPlaying = false;
        let lastIndex = -1;
        let virtualTime = 0;
        let isVirtual = false;

        // --- HÀM KHỞI CHẠY ---
        playBtn.addEventListener('click', () => {
            startScreen.style.display = 'none';
            stage.classList.add('zoom-active');
            isPlaying = true;

            // Kiểm tra xem có nhạc không
            audio.play().then(() => {
                console.log("Music Playing...");
            }).catch(e => {
                console.warn("No music file found. Entering Demo Mode.");
                isVirtual = true;
            });

            requestAnimationFrame(mainLoop);
        });

        // --- VÒNG LẶP CHÍNH (LOGIC ENGINE) ---
        function mainLoop() {
            if (!isPlaying) return;

            // Xác định thời gian hiện tại
            let currentTime = isVirtual ? virtualTime : audio.currentTime;
            if (isVirtual) virtualTime += 0.0166; // Tăng dần ~60fps

            // Cập nhật thanh tiến trình
            const duration = lyrics[lyrics.length - 1].end;
            const progress = (currentTime / duration) * 100;
            progressBar.style.width = Math.min(progress, 100) + "%";

            // Tìm câu lời tương ứng
            let activeLyric = findActiveLyric(currentTime);

            if (activeLyric) {
                let currentIndex = lyrics.indexOf(activeLyric);
                if (lastIndex !== currentIndex) {
                    renderLyric(activeLyric);
                    lastIndex = currentIndex;
                }
            } else {
                if (lastIndex !== -1) {
                    clearDisplay();
                    lastIndex = -1;
                }
            }

            // Kiểm tra kết thúc
            if (currentTime > duration + 1) {
                returnBtn.style.display = 'block';
            }

            requestAnimationFrame(mainLoop);
        }

        // --- HÀM XỬ LÝ HIỂN THỊ ---
        function findActiveLyric(time) {
            return lyrics.find(l => time >= l.start && time <= l.end);
        }

        function renderLyric(data) {
            // Xóa nội dung cũ để kích hoạt lại animation
            textDisplay.innerHTML = "";
            textDisplay.className = "lyric-wrapper"; 
            
            // Ép trình duyệt nhận diện thay đổi class
            void textDisplay.offsetWidth;

            // Tạo phần tử chữ mới
            const h2 = document.createElement('h2');
            h2.innerText = data.text;
            h2.className = data.anim;
            
            // Áp dụng Style từ Timeline
            h2.style.fontFamily = data.font;
            h2.style.fontSize = data.size;
            h2.style.color = data.color;
            h2.style.textShadow = "0 10px 30px rgba(0,0,0,0.8)";

            textDisplay.appendChild(h2);
            console.log("Rendering:", data.text); // Debug xem chữ có chạy trong console ko
        }

        function clearDisplay() {
            textDisplay.style.opacity = "0";
            setTimeout(() => {
                if (lastIndex === -1) textDisplay.innerHTML = "";
                textDisplay.style.opacity = "1";
            }, 500);
        }

        function resetVideo() {
            virtualTime = 0;
            if (!isVirtual) audio.currentTime = 0;
            audio.play();
            lastIndex = -1;
            returnBtn.style.display = 'none';
            textDisplay.innerHTML = "";
        }

        // Đảm bảo kích thước luôn chuẩn
        window.onresize = () => {
            // Tái cấu trúc nếu cần
        };

    </script>
</body>
</html>
