<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duyên Của Trời - Super Lyric Engine V3</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bangers&family=Charm:wght@700&family=Montserrat:wght@900&family=Pacifico&display=swap" rel="stylesheet">
    
    <style>
        /* AUTHOR: KRIS ARTURA
           PROJECT: ADVANCED MUSIC VIDEO ENGINE (CAPCUT STYLE)
           VERSION: 3.0 (FAIL-SAFE EDITION)
        */

        :root {
            --glow-color: #00f2ff;
            --accent-color: #ff007a;
            --text-shadow: 0 0 20px rgba(0, 242, 255, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; overflow: hidden; }

        body {
            background: #000;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- BACKGROUND ENGINE --- */
        #main-stage {
            position: relative;
            width: 100%;
            height: 100%;
            background-image: url('1cd3124a89f9b5fdc7a8aee2bbea4926.png');
            background-size: cover;
            background-position: center;
            transition: transform 10s linear; /* Zoom cực chậm cho nghệ */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #main-stage.active {
            transform: scale(1.2); /* Zoom dần vào khi phát */
        }

        #vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.9) 100%);
            z-index: 2;
        }

        /* --- LYRIC DISPLAY AREA --- */
        #lyric-box {
            position: relative;
            z-index: 10;
            width: 90%;
            text-align: center;
            min-height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .lyric-item {
            position: absolute;
            opacity: 0;
            line-height: 1.2;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }

        /* --- CAPCUT TEXT ANIMATIONS --- */

        /* 1. Hiệu ứng "Bay vào từ hư vô" */
        .anim-zoom-blur {
            animation: zoomBlurIn 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }
        @keyframes zoomBlurIn {
            0% { transform: scale(3); filter: blur(30px); opacity: 0; }
            100% { transform: scale(1); filter: blur(0); opacity: 1; }
        }

        /* 2. Hiệu ứng "Chữ lấp lánh Rainbow" */
        .anim-rainbow {
            background: linear-gradient(to right, #ff007a, #00f2ff, #00ff88, #ff007a);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 2s linear infinite, popIn 0.5s ease-out forwards;
        }
        @keyframes shine { to { background-position: 200% center; } }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* 3. Hiệu ứng "Sóng nhạc" (Wavy) */
        .anim-wavy {
            animation: wavy 1.2s ease-in-out infinite alternate, fadeIn 0.5s forwards;
        }
        @keyframes wavy {
            from { transform: translateY(-10px) rotate(-2deg); }
            to { transform: translateY(10px) rotate(2deg); }
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 4. Hiệu ứng "Cyberpunk Glitch" */
        .anim-glitch {
            text-shadow: 2px 0 #ff007a, -2px 0 #00f2ff;
            animation: glitch 0.3s infinite, slideUp 0.6s forwards;
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 2px); }
            40% { transform: translate(-3px, -2px); }
            60% { transform: translate(3px, 2px); }
            80% { transform: translate(3px, -2px); }
            100% { transform: translate(0); }
        }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* --- UI CONTROLS --- */
        #play-screen {
            position: absolute;
            z-index: 100;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: none;
            border: 2px solid #fff;
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 5px;
        }

        .btn:hover { background: #fff; color: #000; box-shadow: 0 0 30px #fff; }

        .nav-btn {
            position: absolute;
            bottom: 40px;
            padding: 10px 25px;
            font-size: 14px;
            z-index: 50;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            cursor: pointer;
        }

        #exit-btn { left: 40px; }
        #return-btn { right: 40px; display: none; }

        /* Status bar cho Kris dễ debug */
        #debug-info {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="debug-info"> Kris Artura Engine | Virtual Timeline: Off</div>

    <div id="play-screen">
        <h1 style="font-family: 'Charm'; font-size: 4rem; margin-bottom: 30px;">Duyên Của Trời</h1>
        <button class="btn" id="start-trigger">KHỞI ĐỘNG DỰ ÁN</button>
        <p style="margin-top: 20px; color: #777;">(Đảm bảo file nhạc cùng thư mục)</p>
    </div>

    <div id="main-stage">
        <div id="vignette"></div>
        <div id="lyric-box">
            </div>

        <button id="exit-btn" class="nav-btn" onclick="location.reload()">Thoát</button>
        <button id="return-btn" class="nav-btn" onclick="resetProject()">Trở về</button>
    </div>

    <audio id="audio-player">
        <source src="duyen_cua_troi.mp3" type="audio/mpeg">
    </audio>

    <script>
        /**
         * CORE SCRIPT BY KRIS ARTURA
         * Logic tách đoạn, xử lý Animation và Timeline ảo.
         */

        const audio = document.getElementById('audio-player');
        const startTrigger = document.getElementById('start-trigger');
        const playScreen = document.getElementById('play-screen');
        const stage = document.getElementById('main-stage');
        const lyricBox = document.getElementById('lyric-box');
        const returnBtn = document.getElementById('return-btn');
        const debug = document.getElementById('debug-info');

        // DATABASE LỜI NHẠC - CHỈNH SỬA TỪNG GIÂY TẠI ĐÂY
        const lyricsData = [
            { start: 1.0, end: 3.5, text: "Duyên của trời", type: "anim-zoom-blur", font: "'Pacifico'", size: "8vw", color: "#fff" },
            { start: 4.0, end: 6.5, text: "Duyên của trời...", type: "anim-glitch", font: "'Anton'", size: "10vw", color: "#00f2ff" },
            { start: 7.0, end: 10.0, text: "Có công mài sắc", type: "anim-wavy", font: "'Charm'", size: "7vw", color: "#ff007a" },
            { start: 10.5, end: 14.0, text: "CÓ NGÀY NÊN DUYÊN", type: "anim-rainbow", font: "'Montserrat'", size: "9vw", color: "#fff" },
            { start: 14.5, end: 18.0, text: "Kris Artura Design", type: "anim-zoom-blur", font: "'Bangers'", size: "5vw", color: "#aaa" }
        ];

        let virtualTime = 0;
        let useVirtual = false;
        let isRunning = false;
        let lastIndex = -1;

        startTrigger.addEventListener('click', () => {
            playScreen.style.display = 'none';
            stage.classList.add('active');
            isRunning = true;

            // Kiểm tra xem audio có load được không
            audio.play().then(() => {
                console.log("Audio started");
            }).catch(err => {
                console.warn("Audio blocked or file missing. Switching to Virtual Timeline.");
                useVirtual = true;
                debug.innerText = "Kris Artura Engine | Virtual Timeline: ACTIVE";
            });

            requestAnimationFrame(engineLoop);
        });

        function engineLoop() {
            if (!isRunning) return;

            // Lấy thời gian từ Audio hoặc Virtual
            let currentTime = useVirtual ? virtualTime : audio.currentTime;
            
            if (useVirtual) virtualTime += 0.016; // Tương đương ~60fps

            let activeLyric = lyricsData.find(l => currentTime >= l.start && currentTime <= l.end);

            if (activeLyric) {
                let idx = lyricsData.indexOf(activeLyric);
                if (lastIndex !== idx) {
                    lastIndex = idx;
                    showText(activeLyric);
                }
            } else {
                if (lastIndex !== -1) {
                    lyricBox.innerHTML = "";
                    lastIndex = -1;
                }
            }

            // Kết thúc dự án
            const endTime = lyricsData[lyricsData.length - 1].end;
            if (currentTime > endTime + 1) {
                returnBtn.style.display = 'block';
            }

            requestAnimationFrame(engineLoop);
        }

        function showText(data) {
            lyricBox.innerHTML = ""; // Clear cũ
            const el = document.createElement('div');
            el.className = `lyric-item ${data.type}`;
            el.innerText = data.text;
            
            // Style động
            el.style.fontFamily = data.font;
            el.style.fontSize = data.size;
            el.style.color = data.color;
            el.style.opacity = "1";

            lyricBox.appendChild(el);
        }

        function resetProject() {
            virtualTime = 0;
            audio.currentTime = 0;
            audio.play();
            returnBtn.style.display = 'none';
            lastIndex = -1;
        }

        // Tối ưu hóa Resize
        window.addEventListener('resize', () => {
            // Có thể thêm logic tính toán lại font-size cho Mobile tại đây
        });

    </script>
</body>
                               </html>
