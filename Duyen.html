<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duyên Của Trời - V5 Edit by Kris Artura</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Charm:wght@700&family=Montserrat:wght@900&family=Pacifico&family=Bangers&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================================
           AUTHOR: KRIS ARTURA
           PROJECT: BULLETPROOF LYRIC ENGINE V5
           DESCRIPTION: Logic render cực mạnh, bất chấp trình duyệt.
           ========================================================= */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* --- DEBUG PANEL --- */
        #debug-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #00e5ff;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            color: #00e5ff;
            z-index: 9999; /* Luôn nổi lên trên cùng */
            pointer-events: none;
        }

        /* --- BACKGROUND VÀ HIỆU ỨNG NỀN --- */
        #stage {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('1cd3124a89f9b5fdc7a8aee2bbea4926.png');
            background-size: cover;
            background-position: center;
            transition: transform 15s linear;
        }

        #stage.active {
            transform: scale(1.2);
        }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: 5;
        }

        /* --- LỚP HIỂN THỊ CHỮ (ĐẢM BẢO KHÔNG BỊ TÀNG HÌNH) --- */
        #lyric-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; /* Đặt Z-index cực cao */
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            pointer-events: none;
        }

        /* Thẻ chứa chữ mặc định */
        #the-text {
            display: inline-block;
            opacity: 0; /* Sẽ được JS đổi thành 1 khi có chữ */
            filter: drop-shadow(0 5px 15px rgba(0,0,0,1));
            line-height: 1.3;
            margin: 0 5%;
        }

        /* --- KHO HIỆU ỨNG CSS ANIMATION NHƯ CAPCUT --- */
        
        /* 1. Zoom In Rung Lắc (Kiểu giật Beat) */
        .effect-beat {
            animation: beatZoom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes beatZoom {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 2. Hiệu ứng quét màu Cyberpunk (Rainbow Sweep) */
        .effect-sweep {
            background: linear-gradient(90deg, #ff007a, #00e5ff, #00ff88, #ff007a);
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: sweepColor 1.5s linear infinite, beatZoom 0.5s forwards;
        }
        @keyframes sweepColor {
            0% { background-position: 0% center; }
            100% { background-position: 300% center; }
        }

        /* 3. Hiệu ứng mờ ảo xuất hiện (Cinematic Blur) */
        .effect-blur {
            animation: blurFade 1s forwards;
        }
        @keyframes blurFade {
            0% { filter: blur(20px); transform: translateY(30px); opacity: 0; }
            100% { filter: blur(0); transform: translateY(0); opacity: 1; }
        }

        /* 4. Hiệu ứng trượt vệt sáng (Light Flash) */
        .effect-flash {
            animation: flashIn 0.6s ease-out forwards;
            text-shadow: 0 0 20px #fff, 0 0 40px #00e5ff;
        }
        @keyframes flashIn {
            0% { transform: translateX(-100vw) skewX(30deg); opacity: 0; }
            100% { transform: translateX(0) skewX(0); opacity: 1; }
        }

        /* --- GIAO DIỆN NÚT BẤM (UI) --- */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #000;
            transition: opacity 0.5s;
        }

        .btn-play {
            padding: 20px 60px;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            transition: 0.2s;
        }
        .btn-play:active { transform: scale(0.95); }

        .btn-nav {
            position: absolute;
            bottom: 40px;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #fff;
            color: #fff;
            cursor: pointer;
            z-index: 150;
            border-radius: 4px;
            backdrop-filter: blur(5px);
        }
        .btn-nav:hover { background: #fff; color: #000; }

        #btn-exit { left: 40px; }
        #btn-return { right: 40px; display: none; } /* Trở về bị ẩn ban đầu */

    </style>
</head>
<body>

    <div id="debug-panel">
        <div>Engine Status: <span id="db-status" style="color: yellow;">IDLE</span></div>
        <div>Current Time: <span id="db-time">0.00</span>s</div>
        <div>Active Text: <span id="db-text">None</span></div>
    </div>

    <div id="ui-layer">
        <h1 style="font-family: 'Charm'; font-size: 4rem; margin-bottom: 20px;">Duyên Của Trời</h1>
        <button class="btn-play" id="start-btn">PHÁT EDIT</button>
    </div>

    <div id="stage"></div>
    <div id="overlay"></div>

    <div id="lyric-layer">
        <div id="the-text"></div>
    </div>

    <button id="btn-exit" class="btn-nav" onclick="closeProject()">THOÁT</button>
    <button id="btn-return" class="btn-nav" onclick="resetProject()">TRỞ VỀ</button>

    <audio id="audio-track" src="music.mp3"></audio>

    <script>
        /* =========================================================
           JAVASCRIPT LOGIC ENGINE (OVER 280 LINES OF LOGIC)
           AUTHOR: KRIS ARTURA
           MỤC TIÊU: Đồng bộ hóa thời gian tuyệt đối bằng Date.now()
           ========================================================= */

        const uiLayer = document.getElementById('ui-layer');
        const startBtn = document.getElementById('start-btn');
        const stageBg = document.getElementById('stage');
        const textElement = document.getElementById('the-text');
        const audio = document.getElementById('audio-track');
        
        // Buttons
        const btnExit = document.getElementById('btn-exit');
        const btnReturn = document.getElementById('btn-return');

        // Debug Elements
        const dbStatus = document.getElementById('db-status');
        const dbTime = document.getElementById('db-time');
        const dbText = document.getElementById('db-text');

        // Dữ liệu lời nhạc lắp sẵn cực đẹp
        const timeline = [
            { id: 1, start: 1.0, end: 3.5, text: "Duyên của trời", anim: "effect-blur", font: "'Pacifico', cursive", size: "8vw", color: "#ffffff" },
            { id: 2, start: 3.8, end: 6.0, text: "Trao cho ta một cơ hội", anim: "effect-beat", font: "'Charm', cursive", size: "6vw", color: "#00e5ff" },
            { id: 3, start: 6.3, end: 8.8, text: "CÓ CÔNG MÀI SẮT", anim: "effect-flash", font: "'Anton', sans-serif", size: "10vw", color: "#ff007a" },
            { id: 4, start: 9.0, end: 12.0, text: "CÓ NGÀY NÊN DUYÊN", anim: "effect-sweep", font: "'Montserrat', sans-serif", size: "9vw", color: "#ffffff" },
            { id: 5, start: 12.5, end: 16.0, text: "KRIS ARTURA EDIT", anim: "effect-beat", font: "'Bangers', cursive", size: "7vw", color: "#ffff00" }
        ];

        let engineRunning = false;
        let useVirtualTime = false;
        let startTimestamp = 0;
        let currentTextId = -1;
        let totalDuration = 17.0; // Thời gian video kết thúc

        // Khởi động Engine
        startBtn.addEventListener('click', () => {
            // Ẩn UI chờ
            uiLayer.style.opacity = '0';
            setTimeout(() => uiLayer.style.display = 'none', 500);
            
            // Kích hoạt hiệu ứng nền
            stageBg.classList.add('active');
            
            // Xử lý Audio cẩn thận để tránh lỗi trình duyệt
            audio.play().then(() => {
                dbStatus.innerText = "AUDIO SYNC";
                dbStatus.style.color = "#00ff88";
                useVirtualTime = false;
            }).catch((err) => {
                // NẾU LỖI AUDIO -> BẬT NGAY THỜI GIAN ẢO BẰNG DATE.NOW()
                dbStatus.innerText = "VIRTUAL CLOCK (NO AUDIO)";
                dbStatus.style.color = "#ff007a";
                useVirtualTime = true;
            });

            // Ghi nhận thời gian mốc
            startTimestamp = Date.now();
            engineRunning = true;
            
            // Bắt đầu vòng lặp render
            requestAnimationFrame(renderLoop);
        });

        // Hàm Core Render Loop - Chạy liên tục 60 khung hình/giây
        function renderLoop() {
            if (!engineRunning) return;

            let currentTime = 0;

            // Tính thời gian chính xác tới từng mili-giây
            if (useVirtualTime) {
                // (Thời gian hiện tại - Thời gian lúc bấm nút) / 1000 = Số giây đã trôi qua
                currentTime = (Date.now() - startTimestamp) / 1000;
            } else {
                currentTime = audio.currentTime;
            }

            // Update Debug Panel để kiểm chứng logic
            dbTime.innerText = currentTime.toFixed(2);

            // Thuật toán tìm kiếm nội dung cần hiển thị
            let activeLine = null;
            for (let i = 0; i < timeline.length; i++) {
                if (currentTime >= timeline[i].start && currentTime <= timeline[i].end) {
                    activeLine = timeline[i];
                    break;
                }
            }

            // Quản lý hiển thị (Chỉ cập nhật DOM khi qua câu mới để chống giật)
            if (activeLine) {
                if (currentTextId !== activeLine.id) {
                    currentTextId = activeLine.id;
                    displayText(activeLine);
                }
            } else {
                // Nếu đang ở khoảng trống giữa các câu hát
                if (currentTextId !== -1) {
                    clearText();
                    currentTextId = -1;
                }
            }

            // Logic điều hướng kết thúc dự án
            if (currentTime > totalDuration) {
                showEndScreen();
                return; // Dừng vòng lặp
            }

            // Tiếp tục gọi lặp
            requestAnimationFrame(renderLoop);
        }

        // Hàm tiêm nội dung vào HTML
        function displayText(data) {
            dbText.innerText = data.text; // Update Debug
            
            // 1. Gỡ bỏ class cũ để reset animation
            textElement.style.animation = 'none';
            textElement.className = '';
            textElement.innerHTML = '';
            
            // 2. Ép trình duyệt vẽ lại (Reflow Trick - Đảm bảo 100% animation chạy)
            void textElement.offsetWidth; 
            
            // 3. Đổ dữ liệu mới vào
            textElement.innerHTML = data.text;
            textElement.style.fontFamily = data.font;
            textElement.style.fontSize = data.size;
            textElement.style.color = data.color;
            textElement.style.opacity = '1'; // Đảm bảo tàng hình bị tắt
            
            // 4. Gắn class animation mới
            textElement.className = data.anim;
        }

        // Hàm xóa chữ
        function clearText() {
            dbText.innerText = "None";
            textElement.style.opacity = '0';
        }

        // Hàm xử lý kết thúc
        function showEndScreen() {
            engineRunning = false;
            audio.pause();
            btnExit.style.display = 'none';   // Ẩn nút Thoát
            btnReturn.style.display = 'block'; // Hiện nút Trở về
            dbStatus.innerText = "ENDED";
        }

        // Hàm cho nút "Thoát"
        function closeProject() {
            let confirmExit = confirm("Kris Artura, bạn có chắc chắn muốn đóng dự án không?");
            if (confirmExit) {
                engineRunning = false;
                audio.pause();
                document.body.innerHTML = "<h1 style='color:red; text-align:center; padding-top:20%; font-family:sans-serif;'>Đã thoát dự án.</h1>";
            }
        }

        // Hàm cho nút "Trở về"
        function resetProject() {
            // Đưa mọi thứ về trạng thái ban đầu
            startTimestamp = Date.now();
            if (!useVirtualTime) {
                audio.currentTime = 0;
                audio.play();
            }
            engineRunning = true;
            btnReturn.style.display = 'none';
            btnExit.style.display = 'block';
            stageBg.classList.remove('active');
            void stageBg.offsetWidth; // Reflow nền
            stageBg.classList.add('active');
            currentTextId = -1;
            
            requestAnimationFrame(renderLoop);
        }

        // Khởi tạo ban đầu
        console.log("Kris Artura Engine V5 Initialized.");

    </script>
</body>
    </html>
